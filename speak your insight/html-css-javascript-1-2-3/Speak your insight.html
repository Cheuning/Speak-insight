<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speak your insight</title>
  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }
    window.scrollTo(0, 0);
  </script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap");
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    @font-face {
      font-family: "Griun Myoeunddobak";
      src: url("./fonts/Griun_Myoeunddobak-Rg.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Griun PolHumanrights";
      src: url("./fonts/Griun_PolHumanrights-Rg.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Yoon Childfundkorea DaeHan";
      src: url("./fonts/YoonChildfundkoreaDaeHan.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Yoon Childfundkorea ManSeh";
      src: url("./fonts/YoonChildfundkoreaManSeh.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f7f5f0;
      --notebook: #faf8f5;
      --surface: #ffffff;
      --surface-soft: #f7f2eb;
      --text: #111111;
      --text-soft: #1f1f1f;
      --muted: #555555;
      --muted-light: #8a8a8a;
      --ink: #191512;
      --ink-soft: #4a3d32;
      --warm-line: rgba(17, 17, 17, 0.18);
      --sketch-line: rgba(17, 17, 17, 0.16);
      --sketch-line-soft: rgba(17, 17, 17, 0.08);
      --line: rgba(17, 17, 17, 0.12);
      --line-strong: rgba(17, 17, 17, 0.22);
      --accent: #111111;
      --accent-hover: #000000;
      --accent-weak: #eeeeee;
      --danger: #b84f4f;
      --paper-line: rgba(234, 229, 218, 0.72);
      --shadow: 0 4px 24px -4px rgba(17, 17, 17, 0.06);
      --radius: 14px;
      --space-1: 8px;
      --space-2: 16px;
      --space-3: 24px;
      --space-4: 32px;
      --page-gutter: 24px;
      --font-hand: "Griun Myoeunddobak", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-family: var(--font-hand);
      font-synthesis: none;
    }

    * {
      box-sizing: border-box;
      font-synthesis: none;
      font-style: normal;
      font-weight: 400;
    }

    html {
      scrollbar-width: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      font-family: var(--font-hand);
      font-size: 18px;
    }

    body,
    button,
    input,
    select,
    textarea {
      font-family: var(--font-hand) !important;
    }

    body,
    body * {
      font-family: var(--font-hand) !important;
      font-synthesis: none !important;
      font-style: normal !important;
      font-weight: 400 !important;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      line-height: 1;
      text-align: center;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus {
      outline: none;
    }

    .app {
      position: relative;
      width: min(100%, 540px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 86px var(--page-gutter) 48px;
      background:
        linear-gradient(to bottom, rgba(69, 53, 38, 0.055) 1px, transparent 1px) 0 72px / 100% 34px,
        var(--notebook);
      border-inline: 1px solid rgba(17, 17, 17, 0.04);
      box-shadow: 0 0 40px rgba(17, 17, 17, 0.03);
      overflow: hidden;
    }

    .app[data-view="today"],
    .app[data-view="records"] {
      padding-top: 86px;
    }

    .app[data-view="recording"],
    .app[data-view="review"] {
      padding-top: 32px;
    }

    .app::before {
      display: none;
    }

    .section-label {
      display: none;
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 15px;
      line-height: 24px;
      text-align: left;
      letter-spacing: 0;
    }

    .topbar {
      display: none;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: var(--space-4);
      padding-bottom: 0;
    }

    .date-strip {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      margin: 0;
      color: var(--ink);
      font-size: 19px;
      font-weight: 700;
      line-height: 24px;
      text-align: left;
    }

    .date-strip::after {
      display: none;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--line-strong);
      white-space: nowrap;
      box-shadow: none;
    }

    .auth-button {
      min-height: 38px;
      padding: 0 13px;
      border-radius: 999px 920px 980px 900px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      font-size: 17px;
      white-space: nowrap;
      box-shadow: none;
    }

    .auth-button.signed-in {
      background: var(--surface-soft);
      color: var(--text);
      box-shadow: none;
    }

    .auth-user {
      max-width: 190px;
      color: var(--muted);
      font-size: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-control {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px 900px 960px 920px;
      background: transparent;
      color: var(--muted);
      box-shadow: none;
    }

    .settings-control label {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }

    .font-select {
      min-height: 30px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-family: var(--font-hand);
      font-size: 17px;
      outline: none;
      cursor: pointer;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--line-strong);
    }

    .status-pill.recording .status-dot {
      background: var(--danger);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.12); }
    }

    .card {
      position: relative;
      background: transparent;
      border: 1.4px solid var(--sketch-line);
      border-radius: 24px 17px 27px 15px / 18px 25px 16px 23px;
      box-shadow: var(--shadow);
    }

    .paper-lines {
      background-image:
        linear-gradient(to bottom, transparent 33px, var(--paper-line) 34px),
        linear-gradient(to right, rgba(184, 79, 79, 0.13) 0 1px, transparent 1px);
      background-size: 100% 34px, 100% 100%;
      background-position: 0 0, 22px 0;
    }

    .live-card {
      padding: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .app[data-view="today"] .live-card,
    .app[data-view="records"] .live-card,
    .app[data-view="review"] .live-card {
      display: none;
    }

    .app[data-view="recording"] .live-card,
    .app[data-view="review"] .review-card {
      display: block;
      min-height: calc(100vh - 112px);
      padding: var(--space-3) var(--space-3);
      background: transparent;
      border-color: transparent;
    }

    .app[data-view="recording"] .topbar,
    .app[data-view="review"] .topbar,
    .app[data-view="review"] .date-strip,
    .app[data-view="recording"] .date-strip {
      display: none;
    }

    body[data-view="recording"] .bottom-nav,
    body[data-view="review"] .bottom-nav {
      display: none;
    }

    .app[data-view="recording"] .live-card .card-header,
    .app[data-view="review"] .review-card .card-header {
      align-items: center;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
      text-align: center;
    }

    .app[data-view="recording"] .live-card .card-title {
      display: none;
    }

    .review-card {
      display: none;
    }

    /* Full-page Diary Review Layout */
    .app[data-view="review"] .review-card {
      display: block;
      min-height: calc(100vh - 124px);
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .save-draft-panel.paper-lines {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 124px);
      padding: var(--space-3) var(--space-3) var(--space-4);
      border: 0;
      border-radius: 0;
      background-color: transparent;
      box-shadow: none;
    }

    .recording-subtitle {
      margin: 0;
      color: var(--ink-soft);
      font-size: 20px;
      line-height: 1.35;
      text-align: center;
    }

    .app[data-view="recording"] .timer {
      display: inline-grid;
      place-items: center;
      min-width: 94px;
      min-height: 42px;
      border: 1.4px solid var(--sketch-line);
      border-radius: 999px 890px 960px 920px / 760px 980px 800px 930px;
      color: var(--ink);
      font-size: 18px;
    }

    .recording-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      min-height: 30px;
      color: var(--ink-soft);
      font-size: 18px;
      font-weight: 700;
    }

    .recording-state-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d83f36;
      animation: pulse 1.2s infinite;
    }

    .recording-state.paused .recording-state-dot {
      background: var(--muted-light);
      animation: none;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .card-title {
      margin: 0;
      color: var(--text-soft);
      font-size: 23px;
      font-weight: 700;
    }

    .timer {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-family: "Pretendard", var(--font-hand);
      font-size: 14px;
      font-weight: 700;
    }

    .transcript-box {
      position: relative;
      min-height: 112px;
      padding: var(--space-2);
      border-radius: 20px 14px 24px 13px / 16px 24px 15px 22px;
      background-color: transparent;
      border: 1.4px solid var(--sketch-line);
      color: var(--text);
      line-height: 1.7;
      font-size: 20px;
      white-space: pre-wrap;
      text-align: left;
    }

    .app[data-view="recording"] .transcript-box {
      min-height: 240px;
      padding: var(--space-3);
      background-color: transparent;
      border-color: transparent;
      border-radius: 0;
      font-size: 24px;
      text-align: left;
    }

    .review-notebook-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px dashed rgba(17, 17, 17, 0.08);
      padding-bottom: 12px;
      margin-bottom: 18px;
      padding-left: 10px;
    }

    .review-notebook-date {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink-soft);
    }

    .review-notebook-timer {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: transparent;
      border: 1.35px solid rgba(17, 17, 17, 0.28);
      border-radius: 999px 860px 940px 900px / 760px 980px 800px 930px;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      transform: rotate(-0.4deg);
    }

    .review-title-container {
      margin-bottom: 18px;
      padding-left: 28px; /* Clear the vertical line at 22px */
    }

    .recording-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-1);
      align-items: center;
      justify-content: center;
      margin-top: var(--space-3);
      width: 100%;
    }

    .recording-stop-button,
    .recording-pause-button {
      width: 100%;
      min-width: 0;
      min-height: 46px;
      border: 1.4px solid var(--ink);
      border-radius: 999px 870px 940px 900px / 760px 980px 800px 930px;
      font-size: 18px;
      font-weight: 700;
      padding: 0 10px;
    }

    .recording-stop-button {
      background: var(--ink);
      color: #fff;
    }

    .recording-pause-button {
      background: transparent;
      color: var(--ink);
    }

    .recording-stop-button:disabled,
    .recording-pause-button:disabled,
    .save-draft-button:disabled,
    .cancel-draft-button:disabled,
    .mic-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .save-draft-panel {
      position: relative;
    }

    .save-draft-panel[hidden] {
      display: none;
    }

    .review-textarea-container {
      flex-grow: 1;
      margin-bottom: var(--space-3);
      padding-left: 28px; /* Clear the vertical line at 22px */
    }

    .save-draft-input {
      width: 100%;
      min-height: 44px;
      border: none !important;
      background: transparent !important;
      font-size: 26px !important;
      font-weight: 700 !important;
      color: var(--ink) !important;
      padding: 0 !important;
      outline: none !important;
      box-shadow: none !important;
      border-bottom: 1px dashed rgba(17, 17, 17, 0.08) !important;
    }

    .save-draft-input::placeholder {
      color: var(--muted-light);
      font-style: italic;
    }

    .save-draft-textarea.paper-lines {
      width: 100%;
      min-height: 310px;
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      font-size: 20px !important;
      line-height: 34px !important; /* Perfect match with the 34px background paper lines */
      color: var(--text) !important;
      resize: none !important;
      outline: none !important;
      box-shadow: none !important;
    }

    .save-draft-textarea.paper-lines:focus {
      border: none !important;
      box-shadow: none !important;
    }

    .save-draft-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-2);
      padding-top: var(--space-2);
      border-top: 1.5px dashed rgba(17, 17, 17, 0.08);
      margin-top: auto;
    }

    .save-draft-button,
    .cancel-draft-button {
      min-height: 48px;
      padding: 0 24px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 999px 880px 940px 910px / 760px 980px 800px 930px;
      transition: all 0.2s ease;
    }

    .cancel-draft-button {
      background: transparent;
      color: var(--muted);
      border: 1.4px dashed var(--sketch-line) !important;
    }

    .cancel-draft-button:hover {
      background: rgba(184, 79, 79, 0.05);
      color: var(--danger);
      border-color: var(--danger) !important;
    }

    .save-draft-button {
      background: var(--ink);
      color: #fff;
      border: 1.4px solid var(--ink) !important;
      box-shadow: 0 4px 12px rgba(17, 17, 17, 0.1);
    }

    .save-draft-button:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(17, 17, 17, 0.15);
    }

    .settings-card {
      display: none;
      padding: var(--space-1) 0 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .app[data-view="settings"] .settings-card {
      display: block;
    }

    .settings-list {
      display: grid;
      gap: var(--space-2);
    }

    .settings-row {
      position: relative;
      display: grid;
      gap: var(--space-1);
      padding: var(--space-2);
      border: 1.4px solid var(--sketch-line);
      border-radius: 22px 15px 25px 13px / 17px 25px 15px 23px;
      background: transparent;
    }

    .settings-row:nth-child(2n) {
      border-radius: 15px 25px 13px 22px / 23px 17px 24px 15px;
    }

    .settings-label {
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
      text-align: left;
    }

    .settings-card .status-pill {
      display: none;
    }

    .nickname-panel {
      display: grid;
      gap: var(--space-1);
      margin-top: var(--space-1);
    }

    .nickname-panel[hidden] {
      display: none;
    }

    .nickname-input {
      width: 100%;
      min-height: 42px;
      padding: 0 var(--space-2);
      border: 1.4px solid var(--sketch-line);
      border-radius: 18px 12px 20px 13px / 14px 20px 13px 18px;
      background: transparent;
      color: var(--text);
      font-family: var(--font-hand);
      font-size: 18px;
      line-height: 1;
      text-align: left;
      outline: none;
    }

    .nickname-actions {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      flex-wrap: wrap;
    }

    .nickname-save-button {
      min-height: 38px;
      padding: 0 14px;
      border: 1.4px solid var(--ink);
      border-radius: 999px 880px 940px 910px / 760px 980px 800px 930px;
      background: transparent;
      color: var(--ink);
      font-size: 17px;
    }

    .file-actions {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      flex-wrap: wrap;
    }

    .file-save-button,
    .file-load-button {
      min-height: 38px;
      padding: 0 14px;
      border: 1.4px solid var(--ink);
      border-radius: 999px 880px 940px 910px / 760px 980px 800px 930px;
      background: transparent;
      color: var(--ink);
      font-size: 17px;
    }

    .file-save-button {
      background: var(--ink);
      color: #fff;
    }

    .file-save-button:disabled,
    .file-load-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .file-status {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      text-align: left;
    }

    .transcript-box.empty {
      color: var(--muted);
    }

    .interim {
      color: var(--muted);
    }

    .notice {
      display: none;
      margin-top: 12px;
      color: #786a3b;
      background: #fff8dc;
      border: 1px solid #efe1aa;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
    }

    .notice.visible {
      display: block;
    }

    .calendar-card {
      width: 100%;
      padding: 0;
      margin: 0 auto var(--space-2);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .app[data-view="today"] .calendar-card {
      display: none;
    }

    /* today-records-card: only visible in today view */
    .today-records-card {
      display: none;
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .app[data-view="today"] .today-records-card {
      display: block;
    }

    .app[data-view="recording"] .calendar-card,
    .app[data-view="review"] .calendar-card,
    .app[data-view="settings"] .live-card,
    .app[data-view="settings"] .review-card,
    .app[data-view="settings"] .calendar-card {
      display: none;
    }

    .calendar-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .calendar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }

    .period-buttons {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .icon-button {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 52% 48% 55% 45% / 46% 55% 45% 54%;
      color: var(--ink-soft);
      background: transparent;
      border: 1.2px solid var(--sketch-line);
    }

    .icon-button:hover {
      background: transparent;
      color: var(--accent);
    }

    .period-label {
      text-align: left;
      font-size: 26px;
      color: var(--ink);
      font-weight: 700;
      letter-spacing: -0.5px;
      white-space: nowrap;
      line-height: 1;
    }

    .view-toggle {
      display: inline-flex;
      gap: 10px;
      padding: 0;
      background: transparent;
    }

    .view-toggle button {
      min-height: 24px;
      color: var(--muted-light);
      background: transparent;
      font-weight: 700;
      font-size: 15px;
      padding: 0 2px;
      border: none;
    }

    .view-toggle button.active {
      color: var(--ink);
      background: transparent;
      box-shadow: none;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 1px;
    }

    /* ── DIARY GRID CALENDAR ── */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 0;
      border-bottom: 1.5px solid rgba(17,17,17,0.1);
    }

    .weekdays span {
      padding: 6px 0 5px;
      color: var(--muted-light);
      font-size: 11px;
      font-weight: 700;
      text-align: center;
    }

    .weekdays span:first-child { color: rgba(216,63,54,0.6); }
    .weekdays span:last-child  { color: rgba(90,110,200,0.6); }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      /* Rows fill naturally — month ~6 rows, week ~1 row */
    }

    /* Vertical dividers between columns */
    .calendar-grid-col-lines {
      display: none; /* we use cell borders instead */
    }

    /* ── Day Cell: full diary grid style ── */
    .day-cell {
      position: relative;
      min-height: 72px;  /* month mode base height */
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0;
      background: transparent;
      color: var(--text);
      border: none;
      border-right: 1px solid rgba(17,17,17,0.07);
      border-bottom: 1px solid rgba(17,17,17,0.07);
      padding: 5px 5px 4px;
      cursor: pointer;
      transition: background 0.15s ease;
      overflow: hidden;
    }

    .calendar-grid.week-mode .day-cell {
      min-height: 110px;  /* week mode taller cells */
    }

    .day-cell:nth-child(7n) {
      border-right: none;
    }

    .day-cell:hover {
      background: rgba(17,17,17,0.025);
    }

    .day-cell.muted {
      color: rgba(17,17,17,0.22);
      background: rgba(17,17,17,0.012);
    }

    .day-cell.muted .day-entry-title {
      display: none;
    }

    .day-cell.today .day-number {
      color: #d83f36;
    }


    .day-cell.selected {
      background: rgba(216, 63, 54, 0.13);
    }


    .day-number {
      position: relative;
      z-index: 1;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      line-height: 1;
      margin-bottom: 3px;
      display: inline-block;
      width: 22px;
      text-align: center;
    }

    /* Diary entry title text inside each cell */
    .day-entry-title {
      font-size: 10px;
      line-height: 1.3;
      color: var(--ink-soft);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      max-width: 100%;
      word-break: break-all;
      opacity: 0.85;
      text-align: left;
    }

    .calendar-grid.week-mode .day-entry-title {
      -webkit-line-clamp: 5;
      font-size: 11px;
    }

    /* Red dot for days with records — visible only in month when entry title fits */
    .record-dot {
      display: none;  /* hidden — titles shown instead */
    }

    /* ── Inline diary detail panel (shown below calendar when date selected) ── */
    .records-card {
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .app[data-view="today"] .records-card {
      padding: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    /* Inline expanded diary view under calendar */
    .diary-detail-panel {
      margin-top: 0;
      padding: 0;
      display: none;
    }

    .diary-detail-panel.open {
      display: block;
    }

    .diary-detail-date {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px 8px;
      font-size: 17px;
      font-weight: 700;

    }

    .records-meta {
      color: var(--muted);
      font-size: 17px;
      font-weight: 700;
    }

    .app[data-view="today"] .records-meta {
      display: none;
    }

    .records-card .card-title {
      display: none;
    }

    .records-list {
      display: grid;
      gap: var(--space-2);
      margin-top: 0;
    }

    .today-date-note {
      padding: 0 var(--space-1);
    }

    .records-list.has-records {
      margin-top: var(--space-3);
    }

    .empty-state {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      padding: 0 var(--space-1);
      color: var(--ink-soft);

    }

    .app[data-view="today"] .empty-state {
      padding-top: 0;
      font-size: 22px;
    }

    .empty-date {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 19px;
      font-weight: 700;
      line-height: 24px;
    }

    .cozy-today-date {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 0;
      margin-bottom: 0;
      border-bottom: none;
      position: relative;
      width: fit-content;

      height: 102px;
    }

    .today-date-note .cozy-today-date {

      margin-bottom: 24px;
    }

    .today-entry-layout {

    }

    .today-entry-layout::after {

    .today-entry-layout > .cozy-today-date {

    }

    .today-first-record-slot {

    }

    .today-first-record-slot .record-item {

    }

    .today-first-record-slot .record-top {

    }

    .today-first-record-slot .record-meta-group,

      min-height: 34px;
      align-items: center;
      padding-bottom: 0;
    }

    .today-first-record-slot .record-read {
      padding-left: 0;
      padding-right: 0;
    }

    .today-welcome-note {
      min-width: 0;
      padding-top: 34px;
      padding-left: 0;
      padding-right: 0;
      color: var(--ink-soft);
      text-align: left;
    }

    .today-welcome-title {
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      line-height: 34px;
      transform: translateY(4px);
    }

    .today-welcome-text {
      clear: both;
      margin: 0;
      color: var(--text);
      font-size: 17px;
      line-height: 34px;
      white-space: pre-line;

      word-break: break-word;
      transform: translateY(-30px);
    }

    .today-rest-records {
      display: grid;
      gap: var(--space-2);
      margin-top: var(--space-2);
    }

    .cozy-date-top {
      font-size: 14px;
      color: var(--muted-light);
      letter-spacing: 0.5px;
      margin: 0;
      height: 24px;
      line-height: 24px;
      opacity: 0.85;
      text-align: right;
      padding-top: 0;

    }

    .cozy-date-main {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1;
      height: 68px;
    }

    .cozy-date-day {
      font-size: 46px;
      color: var(--ink);
      height: 68px;
      line-height: 68px;
      letter-spacing: -1px;
      margin: 0;
      padding-top: 0;

    }

    .cozy-date-weekday {
      font-size: 16px;
      color: var(--ink-soft);
      height: 34px;
      line-height: 34px;
      opacity: 0.85;
      margin: 0;
      padding-top: 2px;

    .empty-question {
      display: block;
      color: var(--ink-soft);
      font-size: 22px;
      line-height: 34px;
      margin: 0;
      margin-top: 34px;
      padding-top: 2px;
    }

    .record-item {
      position: relative;
      padding: 0 var(--space-1) var(--space-2);
      border: 0;
      border-bottom: 1px solid rgba(17,17,17,0.06);
      border-radius: 0;
      background-color: transparent;
      text-align: left;
      min-width: 0;
      max-width: 100%;
    }

    .record-item:last-child {
      border-bottom: none;
    }

    .app[data-view="today"] .record-item {
      border-color: transparent;
      padding-inline: 0;
    }

    .record-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-2);
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }

    .record-meta-group {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      flex-wrap: wrap;
      min-height: 34px;
      transform: translateY(3px);
    }

    .record-number {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 24px;
      border-radius: 54% 46% 52% 48% / 48% 54% 46% 52%;
      background: var(--ink);

    }

    .record-time {

    }

    .record-controls {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .edit-button,
    .delete-button {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 52% 48% 55% 45% / 44% 56% 46% 54%;
    }

    .edit-button {
      color: var(--ink);
      background: transparent;
      border: 1.2px solid var(--sketch-line);
    }

    /* Eraser Rubbing Motion Styles */
    .record-read {
      position: relative;
    }

    .record-read.is-erasing {
      pointer-events: none;
    }

    .record-read.is-erasing .record-read-title,
    .record-read.is-erasing .record-read-text {
      animation: text-erasing 0.8s forwards ease-in-out;
    }

    @keyframes text-erasing {
      0% {
        opacity: 1;
        filter: blur(0px);
      }
      30% {
        opacity: 0.8;
        filter: blur(1.5px);
        transform: skewX(-3deg);
      }
      60% {
        opacity: 0.4;
        filter: blur(3.5px);
        transform: skewX(3deg);
      }
      100% {
        opacity: 0.05;
        filter: blur(7px);
        transform: scale(0.97);
      }
    }

    .eraser-motion-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-eraser {
      width: 64px;
      height: 64px;
      object-fit: contain;
      animation: eraser-rubbing 0.8s ease-in-out forwards;
    }

    @keyframes eraser-rubbing {
      0% {
        transform: translate(-60px, -20px) rotate(-15deg) scale(0.8);
        opacity: 0;
      }
      15% {
        transform: translate(-40px, 0px) rotate(-20deg) scale(1.1);
        opacity: 1;
      }
      30% {
        transform: translate(40px, -10px) rotate(-10deg) scale(1.1);
      }
      45% {
        transform: translate(-30px, 10px) rotate(-25deg) scale(1.1);
      }
      60% {
        transform: translate(30px, -5px) rotate(-15deg) scale(1.1);
      }
      75% {
        transform: translate(-10px, 15px) rotate(-20deg) scale(1.1);
      }
      90% {
        transform: translate(10px, 5px) rotate(-15deg) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(20px, 10px) rotate(-10deg) scale(0.7);
        opacity: 0;
      }
    }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .sync-badge.pending {
      background: #fff8dc;
      color: #786a3b;
    }

    .sync-badge.synced {
      background: var(--accent-weak);
      color: var(--accent);
    }

    .sync-badge.error {
      background: #f8eeee;
      color: var(--danger);
    }

    .record-editor {
      display: grid;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .record-read {
      display: grid;
      gap: 2px;
      padding-left: 32px;
      padding-right: 32px;
      min-width: 0;
    }

    .record-read-title {
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      line-height: 34px;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      transform: translateY(4px);
    }

    .record-read-text {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      line-height: 34px;
      white-space: pre-wrap;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      transform: translateY(4px);
    }

    .record-title-input,
    .record-textarea {
      width: 100%;
      font-family: var(--font-hand);
      border: 1.4px solid var(--sketch-line);
      border-radius: 18px 12px 21px 13px / 14px 21px 13px 19px;
      background-color: transparent;
      color: var(--text);
      outline: none;
      text-align: left;
    }

    .record-title-input {
      min-height: 44px;
      padding: 0 var(--space-2);

      align-items: center;
      font-size: 21px;
      font-weight: 700;
    }

    .record-textarea {
      min-height: 112px;
      padding: var(--space-2);
      line-height: 1.7;
      font-size: 19px;
      resize: vertical;
    }

    .record-title-input:focus,
    .record-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-weak);
    }

    .record-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-1);
      flex-wrap: wrap;
      margin-top: var(--space-1);
    }

    .save-note {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.2;
    }

    .save-button {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px 880px 940px 910px / 760px 980px 800px 930px;
      color: #fff;
      background: var(--ink);
      border: 1.4px solid var(--ink);
      font-weight: 700;
      font-size: 17px;
    }

    .delete-button {

      background: #f8eeee;

    .record-item audio {
      width: 100%;
      display: block;
      margin-bottom: 12px;

    .edit-panel[hidden] {
      display: none;
    }

    .edit-panel {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: var(--space-3);
      background: rgba(25, 21, 18, 0.45);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .edit-paper {
      width: min(100%, 500px);
      display: grid;
      gap: 14px;
      padding: 32px 32px 24px 52px;
      border: 1.5px solid var(--sketch-line);
      border-radius: 20px 24px 16px 22px / 24px 18px 22px 16px;
      box-shadow: 0 16px 48px rgba(17, 17, 17, 0.18);
      background:
        linear-gradient(to right, rgba(184, 79, 79, 0.2) 0 1px, transparent 1px) 38px 0 no-repeat,
        linear-gradient(to bottom, rgba(69, 53, 38, 0.05) 1px, transparent 1px) 0 26px / 100% 34px,
        var(--notebook);
      position: relative;
    }

    /* Spiral/Ring binder punch holes on the left edge */
    .edit-paper::before {
      content: "";
      position: absolute;
      top: 36px;
      bottom: 36px;
      left: 14px;
      width: 14px;
      background: 
        radial-gradient(circle, var(--bg) 0 4px, transparent 5px),
        radial-gradient(circle, rgba(17, 17, 17, 0.15) 0 5px, transparent 6px);
      background-position: center top, center top;
      background-size: 14px 44px;
      background-repeat: repeat-y;
      pointer-events: none;

    .edit-panel-title {
      margin: 0 0 12px;
      color: var(--ink);
      font-size: 24px;
      font-weight: 700;
      font-family: var(--font-hand);
      border-bottom: 2px dashed rgba(17, 17, 17, 0.1);

    .edit-paper .record-title-input {
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      font-size: 22px !important;
      font-weight: 700 !important;
      color: var(--ink) !important;
      box-shadow: none !important;
      border-bottom: 1.5px dashed rgba(17, 17, 17, 0.12) !important;
      border-radius: 0 !important;
      margin-bottom: 8px;
      font-family: var(--font-hand) !important;
    }

    .edit-paper .record-title-input:focus {
      border-bottom-color: var(--text) !important;
    }

    .edit-paper .record-textarea {
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      font-size: 20px !important;
      line-height: 34px !important; /* Perfect match with the 34px background paper lines */
      color: var(--text) !important;
      box-shadow: none !important;
      resize: vertical !important;
      min-height: 238px;
      border-radius: 0 !important;
      font-family: var(--font-hand) !important;

    .edit-save-button,

    .bottom-nav {
      position: fixed;
      left: max(var(--page-gutter), calc((100vw - 540px) / 2 + var(--page-gutter)));
      right: max(var(--page-gutter), calc((100vw - 540px) / 2 + var(--page-gutter)));

      justify-content: flex-end;

      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0 12px;
      color: #fff;
      background: var(--ink);
      font-weight: 700;
      font-size: 13px;
      border: 1.2px solid var(--ink);
      border-radius: 10px 10px 4px 4px / 9px 11px 4px 4px;

    @keyframes circle-scribble {
      0% { transform: translate(-50%, -46%) rotate(-15deg) scale(0.85); opacity: 0; }
      100% { transform: translate(-50%, -46%) rotate(-5deg) scale(1); opacity: 0.8; }
    }

    /* Cozy hand-drawn diary stats popup/tooltip */
    .stats-tooltip {
      position: fixed;
      width: 230px;
      padding: 16px;
      border: 1.4px solid var(--sketch-line);
      background-color: var(--notebook);
      border-radius: 18px 24px 15px 22px / 22px 18px 25px 15px;
      box-shadow: 0 8px 32px rgba(17, 17, 17, 0.12);
      z-index: 1000;
      opacity: 0;
      transform: translateY(10px) scale(0.95);
      transition: opacity 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      text-align: left;
    }

    .stats-tooltip.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .stats-tooltip-header h3 {
      margin: 0 0 10px 0;
      font-size: 19px;

        ));

        return snapshot.docs.map((snapshotDoc) => ({
          id: snapshotDoc.id,
          ...snapshotDoc.data()
        }));
      },
      async fetchProfile() {
        if (!this.currentUser) return null;

        const snapshot = await getDoc(doc(firestore, "users", this.currentUser.uid, "profile", "settings"));
        return snapshot.exists() ? snapshot.data() : null;
      },
      async saveProfile(profile) {
        if (!this.currentUser) return { skipped: true, reason: "not-signed-in" };

        await setDoc(
          doc(firestore, "users", this.currentUser.uid, "profile", "settings"),
          {
            ...profile,
            updatedAt: Date.now()
          },
          { merge: true }
        );

        return { saved: true };
      }
    };

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            const store = database.createObjectStore(STORE_NAME, { keyPath: "id" });
            store.createIndex("date", "date", { unique: false });
            store.createIndex("createdAt", "createdAt", { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function getAllRecords() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const request = tx.objectStore(STORE_NAME).getAll();
        request.onsuccess = () => resolve((request.result || []).map(normalizeRecord));
        request.onerror = () => reject(request.error);
      });
    }

    function saveRecord(record) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const request = tx.objectStore(STORE_NAME).put(normalizeRecord(record));
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    function deleteRecord(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const request = tx.objectStore(STORE_NAME).delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function saveRecordAndSync(record) {
      if (IS_PREVIEW_MODE) {
        const previewRecord = normalizeRecord({
          ...record,
          updatedAt: Date.now(),
          syncStatus: SYNC_LOCAL_ONLY,
          lastSyncError: ""
        });
        records = records.map((item) => item.id === previewRecord.id ? previewRecord : item);
        if (!records.some((item) => item.id === previewRecord.id)) records.unshift(previewRecord);
        renderAll();
        return;
      }

      const status = cloudSync.isConfigured && cloudSync.currentUser ? SYNC_PENDING : SYNC_LOCAL_ONLY;
      const localRecord = normalizeRecord({
        ...record,
        updatedAt: Date.now(),
        syncStatus: status,
        lastSyncError: ""
      });

      await saveRecord(localRecord);
      await refreshRecords();
      syncRecordToCloud(localRecord).catch((error) => {
        console.warn("Background cloud sync failed", error);
      });
    }

    async function deleteRecordEverywhere(record) {
      if (IS_PREVIEW_MODE) {
        records = records.filter((item) => item.id !== record.id);
        renderAll();
        return;
      }

      await deleteRecord(record.id);

      if (cloudSync.isConfigured && cloudSync.currentUser) {
        try {
          await cloudSync.deleteTextRecord(record.id);
        } catch (error) {
          console.warn("Cloud delete failed", error);
        }
      }

      await refreshRecords();
    }

    async function syncRecordToCloud(record) {
      if (!cloudSync.isConfigured || !cloudSync.currentUser) return;

      try {
        await cloudSync.upsertTextRecord(toCloudTextRecord(record));
        await saveRecord({
          ...record,
          syncStatus: SYNC_SYNCED,
          lastSyncError: ""
        });
        await refreshRecords();
      } catch (error) {
        await saveRecord({
          ...record,
          syncStatus: SYNC_ERROR,
          lastSyncError: error.message || "Cloud sync failed"
        });
        await refreshRecords();
      }
    }

    async function syncPendingRecords() {
      if (!cloudSync.isConfigured || !cloudSync.currentUser) return;

      const pendingRecords = (await getAllRecords()).filter((record) => (
        record.syncStatus === SYNC_PENDING || record.syncStatus === SYNC_ERROR || record.syncStatus === SYNC_LOCAL_ONLY
      ));

      for (const record of pendingRecords) {
        await syncRecordToCloud({
          ...record,
          syncStatus: SYNC_PENDING
        });
      }
    }

    async function mergeCloudTextRecords() {
      if (!cloudSync.isConfigured || !cloudSync.currentUser) return;

      const cloudRecords = await cloudSync.fetchTextRecords();
      const localRecords = await getAllRecords();
      const localById = new Map(localRecords.map((record) => [record.id, record]));

      for (const cloudRecord of cloudRecords) {
        const localRecord = localById.get(cloudRecord.id);
        if (localRecord && localRecord.updatedAt > cloudRecord.updatedAt) continue;

        await saveRecord({
          ...localRecord,
          ...cloudRecord,
          audioBlob: null,
          hasLocalAudio: false,
          syncStatus: SYNC_SYNCED,
          lastSyncError: ""
        });
      }

      await refreshRecords();
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatKoreanDate(date) {
      return new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "short"
      }).format(date);
    }

    function formatMonthDayWeekday(date) {
      return new Intl.DateTimeFormat("ko-KR", {
        month: "long",
        day: "numeric",
        weekday: "short"
      }).format(date);
    }

    function formatHeaderDate(date) {
      const year = String(date.getFullYear()).slice(-2);
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const weekday = new Intl.DateTimeFormat("ko-KR", { weekday: "long" }).format(date);
      return `${year}년 ${month}월 ${day}일 ${weekday}`;
    }

    function formatCommaDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const weekday = new Intl.DateTimeFormat("ko-KR", { weekday: "short" }).format(date);
      return `${year}, ${month}, ${day}, ${weekday}`;
    }

    function createCozyDateElement(dateObj) {
      const container = document.createElement("div");
      container.className = "cozy-today-date";

      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      const day = String(dateObj.getDate()).padStart(2, "0");
      const weekdayShort = new Intl.DateTimeFormat("ko-KR", { weekday: "short" }).format(dateObj);
      const weekdayLong = new Intl.DateTimeFormat("ko-KR", { weekday: "long" }).format(dateObj);

      const monthEnglish = new Intl.DateTimeFormat("en-US", { month: "long" }).format(dateObj);
      const weekdayEnglish = new Intl.DateTimeFormat("en-US", { weekday: "long" }).format(dateObj);

      const topEl = document.createElement("div");
      topEl.className = "cozy-date-top";
      topEl.textContent = `${monthEnglish}, ${weekdayEnglish}`;
      container.appendChild(topEl);

      const mainEl = document.createElement("div");
      mainEl.className = "cozy-date-main";

      const dayEl = document.createElement("span");
      dayEl.className = "cozy-date-day";
      dayEl.textContent = Number(day);

      mainEl.append(dayEl);
      container.appendChild(mainEl);

      return container;
    }

    function renderDateStrip() {
      dateStrip.textContent = formatHeaderDate(new Date());
    }

    function setAppView(view, options = {}) {
      const scrollBehavior = options.scrollBehavior || "smooth";
      currentView = ["today", "records", "recording", "review", "settings"].includes(view) ? view : "today";
      app.dataset.view = currentView;
      document.body.dataset.view = currentView;
      const sectionLabels = {
        today: "오늘",
        records: "기록",
        recording: "기록 중",
        review: "저장하기",
        settings: "설정"
      };
      sectionLabel.textContent = sectionLabels[currentView] || "오늘";
      todayButton.classList.toggle("active", currentView === "today");
      calendarButton.classList.toggle("active", currentView === "records");
      settingsButton.classList.toggle("active", currentView === "settings");

      if (currentView === "today") {
        selectedDate = startOfDay(new Date());
        viewDate = selectedDate;
        // Close diary detail panel when returning to today view
        if (diaryDetailPanel) diaryDetailPanel.classList.remove("open");
      }

      renderAll();
      window.scrollTo({ top: 0, behavior: scrollBehavior });
    }

    function formatTime(timestamp) {
      return new Intl.DateTimeFormat("ko-KR", {
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(timestamp));
    }

    function createDefaultRecordTitle(date = new Date()) {
      return "제목";
    }

    function isTimeDefaultRecordTitle(title) {
      return /^(오전|오후)\s*\d{1,2}:\d{2}의 기록$/.test(title || "");
    }

    function getRecordDisplayTitle(record) {
      const defaultTitle = createDefaultRecordTitle(new Date(record.createdAt || Date.now()));
      return !record.title || isTimeDefaultRecordTitle(record.title) ? defaultTitle : record.title;
    }

    function loadPreviewRecords() {
      if (PREVIEW_MODE !== "today-saved") return false;

      const now = new Date();
      const today = startOfDay(now);
      const createdAt = now.getTime() - 6 * 60 * 1000;
      selectedDate = today;
      viewDate = today;
      records = [
        normalizeRecord({
          id: "preview-today-saved",
          title: "두근두근 제목 짓기",
          date: toDateKey(today),
          createdAt,
          updatedAt: createdAt,
          audioBlob: null,
          transcript: "오늘은 어떤 일이 있었나요? 지금 떠오르는 생각들, 인사이트를 적어봐요!",
          duration: 15,
          hasLocalAudio: false,
          syncStatus: SYNC_LOCAL_ONLY
        })
      ];
      setStatus("미리보기", false);
      setAppView("today", { scrollBehavior: "auto" });
      return true;
    }

    function formatDuration(seconds) {
      const total = Math.max(0, Math.round(seconds || 0));
      const mins = String(Math.floor(total / 60)).padStart(2, "0");
      const secs = String(total % 60).padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function createId() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function normalizeRecord(record) {
      const createdAt = record.createdAt || Date.now();
      return {
        id: record.id || createId(),
        title: record.title || createDefaultRecordTitle(new Date(createdAt)) || DEFAULT_RECORD_TITLE,
        date: record.date || toDateKey(new Date(createdAt)),
        createdAt,
        updatedAt: record.updatedAt || createdAt,
        audioBlob: null,
        transcript: record.transcript || "",
        duration: record.duration || 0,
        hasLocalAudio: false,
        syncStatus: record.syncStatus || SYNC_LOCAL_ONLY,
        lastSyncError: record.lastSyncError || ""
      };
    }

    function toCloudTextRecord(record) {
      const normalized = normalizeRecord(record);
      return {
        id: normalized.id,
        date: normalized.date,
        createdAt: normalized.createdAt,
        updatedAt: normalized.updatedAt,
        title: normalized.title,
        transcript: normalized.transcript,
        duration: normalized.duration
      };
    }

    function getSyncLabel(status) {
      if (status === SYNC_SYNCED) return "동기화됨";
      if (status === SYNC_PENDING) return "동기화 대기";
      if (status === SYNC_ERROR) return "동기화 오류";
      return "";
    }

    function getSupportedAudioMimeType() {
      if (!("MediaRecorder" in window) || !MediaRecorder.isTypeSupported) return "";

      const candidates = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4;codecs=mp4a.40.2",
        "audio/mp4",
        "audio/aac"
      ];

      return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
    }

    function cleanupActiveStream() {
      if (!activeStream) return;
      activeStream.getTracks().forEach((track) => track.stop());
      activeStream = null;
    }

    function showMicMessage(message, status = "기록 오류") {
      micNotice.textContent = message;
      micNotice.classList.add("visible");
      setStatus(status, false);
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function showAuthMessage(message, status = "로그인 오류") {
      authUser.textContent = message;
      setStatus(status, false);
    }

    function getAuthErrorMessage(error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/unauthorized-domain") {
        return "Firebase 승인 도메인에 현재 주소를 추가해야 합니다.";
      }
      if (code === "auth/popup-closed-by-user" || code === "auth/cancelled-popup-request") {
        return "팝업 로그인이 닫혔습니다. 다시 시도해 주세요.";
      }
      if (code === "auth/network-request-failed") {
        return "네트워크 연결을 확인해 주세요.";
      }
      return "로그인에 실패했습니다. localhost 또는 배포 주소에서 다시 시도해 주세요.";
    }

    function getNicknameStorageKey(user) {
      return `${NICKNAME_STORAGE_PREFIX}${user.uid}`;
    }

    function getDisplayName(user) {
      return currentNickname || user.displayName || user.email || "Google 계정";
    }

    function loadLocalNickname(user) {
      return localStorage.getItem(getNicknameStorageKey(user)) || "";
    }

    function saveLocalNickname(user, nickname) {
      localStorage.setItem(getNicknameStorageKey(user), nickname);
    }

    async function loadNickname(user) {
      const localNickname = loadLocalNickname(user);
      currentNickname = localNickname;

      try {
        const profile = await cloudSync.fetchProfile();
        if (profile && typeof profile.nickname === "string") {
          currentNickname = profile.nickname.trim();
          if (currentNickname) saveLocalNickname(user, currentNickname);
        }
      } catch (error) {
        console.warn("Nickname profile fetch failed", error);
      }

      updateAuthUi(user);
    }

    async function saveNickname() {
      const user = cloudSync.currentUser;
      if (!user) return;

      const nickname = nicknameInput.value.trim();
      currentNickname = nickname;
      saveLocalNickname(user, nickname);
      updateAuthUi(user);
      setStatus("닉네임 저장됨", false);

      try {
        await cloudSync.saveProfile({ nickname });
      } catch (error) {
        console.warn("Nickname profile save failed", error);
        setStatus("이 기기에 저장됨", false);
      }
    }

    function updateAuthUi(user) {
      if (user) {
        authButton.textContent = "로그아웃";
        authButton.disabled = false;
        authButton.classList.add("signed-in");
        authUser.textContent = getDisplayName(user);
        nicknamePanel.hidden = false;
        nicknameInput.value = currentNickname;
        return;
      }

      authButton.textContent = "Google 로그인";
      authButton.disabled = false;
      authButton.classList.remove("signed-in");
      authUser.textContent = "";
      nicknamePanel.hidden = true;
      nicknameInput.value = "";
      currentNickname = "";
    }

    async function handleAuthClick() {
      if (cloudSync.currentUser) {
        await signOut(auth);
        return;
      }

      if (IS_FILE_URL) {
        showAuthMessage("file://에서는 Google 로그인이 제한됩니다. localhost 또는 배포 주소로 열어주세요.", "로그인 주소 확인");
        return;
      }

      authButton.disabled = true;
      authButton.textContent = "로그인 중";
      setStatus("로그인 중", false);
      localStorage.setItem(AUTH_PENDING_KEY, String(Date.now()));

      try {
        await signInWithRedirect(auth, provider);
      } catch (error) {
        console.error(error);
        localStorage.removeItem(AUTH_PENDING_KEY);
        showAuthMessage(getAuthErrorMessage(error));
        authButton.disabled = false;
        authButton.textContent = "Google 로그인";
      }
    }

    function setupAuthSync() {
      getRedirectResult(auth).catch((error) => {
        console.warn("Redirect login result failed", error);
        localStorage.removeItem(AUTH_PENDING_KEY);
        showAuthMessage(getAuthErrorMessage(error));
      });

      onAuthStateChanged(auth, async (user) => {
        cloudSync.currentUser = user;

        const authPendingAt = Number(localStorage.getItem(AUTH_PENDING_KEY) || 0);
        if (user || authPendingAt) localStorage.removeItem(AUTH_PENDING_KEY);

        if (!user || !db) {
          updateAuthUi(user);
          if (authPendingAt && !user) {
            showAuthMessage("로그인이 완료되지 않았습니다. Firebase 승인 도메인과 현재 접속 주소를 확인해 주세요.", "로그인 확인 필요");
          } else {
            setStatus("대기 중", false);
          }
          return;
        }

        currentNickname = loadLocalNickname(user);
        updateAuthUi(user);
        setStatus("동기화 중", false);
        try {
          await loadNickname(user);
          await mergeCloudTextRecords();
          await syncPendingRecords();
          setStatus("동기화됨", false);
        } catch (error) {
          console.error(error);
          setStatus("동기화 오류", false);
        }
      });
    }

    function renderAll() {
      renderCalendar();
      renderRecords();
    }

    // Map: dateKey → first record title (for cell preview)
    function buildRecordTitleMap() {
      const map = {};
      records.forEach((r) => {
        if (!map[r.date]) map[r.date] = getRecordDisplayTitle(r);
      });
      return map;
    }

    function renderCalendar() {
      const recordTitleMap = buildRecordTitleMap();
      const todayKey = toDateKey(new Date());
      const selectedKey = toDateKey(selectedDate);
      const days = calendarMode === "month" ? getMonthDays(viewDate) : getWeekDays(viewDate);

      calendarGrid.innerHTML = "";
      // Toggle week-mode class for taller cells
      calendarGrid.classList.toggle("week-mode", calendarMode === "week");

      periodLabel.textContent = calendarMode === "month"
        ? `${viewDate.getFullYear()}년 ${viewDate.getMonth() + 1}월`
        : getWeekOfMonthLabel(viewDate);

      days.forEach((date) => {
        const dateKey = toDateKey(date);
        const isMuted = calendarMode === "month" && date.getMonth() !== viewDate.getMonth();
        const isToday = dateKey === todayKey;
        const isSelected = dateKey === selectedKey;
        const entryTitle = recordTitleMap[dateKey];

        const button = document.createElement("button");
        button.type = "button";
        button.className = "day-cell";
        button.setAttribute("aria-label", `${formatKoreanDate(date)} 선택`);

        if (isMuted) button.classList.add("muted");
        if (isToday) button.classList.add("today");
        if (isSelected) button.classList.add("selected");

        // Day number
        const number = document.createElement("span");
        number.className = "day-number";
        number.textContent = date.getDate();
        button.appendChild(number);

        // Entry title preview inside the cell
        if (entryTitle && !isMuted) {
          const titleEl = document.createElement("span");
          titleEl.className = "day-entry-title";
          titleEl.textContent = entryTitle;
          button.appendChild(titleEl);
        }

        button.addEventListener("click", () => {
          const wasSelected = isSelected && diaryDetailPanel.classList.contains("open");
          // Deselect all cells
          calendarGrid.querySelectorAll(".day-cell.selected").forEach((c) => c.classList.remove("selected"));

          if (wasSelected) {
            // Toggle off
            diaryDetailPanel.classList.remove("open");
            return;
          }

          button.classList.add("selected");
          selectedDate = startOfDay(date);
          // Update diary detail date label
          diaryDetailDateText.textContent = formatMonthDayWeekday(date);
          diaryDetailPanel.classList.add("open");
          renderRecords();

          // Smooth scroll to detail panel
          setTimeout(() => {
            diaryDetailPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }, 80);
        });

        calendarGrid.appendChild(button);
      });

      // Sync diary detail panel with current state
      if (currentView === "records" && diaryDetailPanel) {
        diaryDetailDateText.textContent = formatMonthDayWeekday(selectedDate);
        diaryDetailPanel.classList.add("open");
      }
    }

    function getMonthDays(date) {
      const first = new Date(date.getFullYear(), date.getMonth(), 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      return Array.from({ length: 42 }, (_, index) => {
        const day = new Date(start);
        day.setDate(start.getDate() + index);
        return day;
      });
    }

    function getWeekDays(date) {
      const start = startOfDay(date);
      start.setDate(start.getDate() - start.getDay());
      return Array.from({ length: 7 }, (_, index) => {
        const day = new Date(start);
        day.setDate(start.getDate() + index);
        return day;
      });
    }

    function getWeekOfMonthLabel(date) {
      const selected = startOfDay(date);
      const firstDayOfMonth = new Date(selected.getFullYear(), selected.getMonth(), 1);
      const firstWeekStart = startOfDay(firstDayOfMonth);
      firstWeekStart.setDate(firstWeekStart.getDate() - firstWeekStart.getDay());

      const selectedWeekStart = startOfDay(selected);
      selectedWeekStart.setDate(selectedWeekStart.getDate() - selectedWeekStart.getDay());

      const diffDays = Math.round((selectedWeekStart - firstWeekStart) / (1000 * 60 * 60 * 24));
      const weekNumber = Math.floor(diffDays / 7) + 1;
      const koreanOrdinals = ["첫째", "둘째", "셋째", "넷째", "다섯째", "여섯째"];
      const ordinal = koreanOrdinals[weekNumber - 1] || `${weekNumber}번째`;

      return `${selected.getMonth() + 1}월 ${ordinal} 주`;
    }

    function renderRecords() {
      const dateKey = toDateKey(selectedDate);
      const dayRecords = records
        .filter((record) => record.date === dateKey)
        .sort((a, b) => a.createdAt - b.createdAt);

      if (currentView === "today") {
        // ── Today view: render into todayRecordsList ──
        todayRecordsList.innerHTML = "";
        todayRecordsList.classList.toggle("has-records", Boolean(dayRecords.length));

        if (!dayRecords.length) {
          const empty = document.createElement("div");
          empty.className = "today-entry-layout empty-state";

          const welcome = document.createElement("div");
          welcome.className = "today-welcome-note";

          const welcomeTitle = document.createElement("p");
          welcomeTitle.className = "today-welcome-title";
          welcomeTitle.textContent = "어서 오세요.";

          const welcomeText = document.createElement("p");
          welcomeText.className = "today-welcome-text";
          welcomeText.textContent = `이곳은 오늘의 생각과 경험,
문득 떠오른 인사이트를
목소리로 남겨두는 공책입니다.

잘 정리된 말이 아니어도 괜찮아요.
지금의 생각부터 편하게 기록해보세요.`;

          const dateEl = createCozyDateElement(selectedDate);
          welcome.append(welcomeTitle, welcomeText);
          empty.append(dateEl, welcome);
          todayRecordsList.appendChild(empty);
          return;
        }

        const entryLayout = document.createElement("div");
        entryLayout.className = "today-entry-layout";

        const firstRecordSlot = document.createElement("div");
        firstRecordSlot.className = "today-first-record-slot";

        const dateEl = createCozyDateElement(selectedDate);
        entryLayout.append(dateEl, firstRecordSlot);
        todayRecordsList.appendChild(entryLayout);

        renderRecordItems(dayRecords.slice(0, 1), firstRecordSlot);

        if (dayRecords.length > 1) {
          const restRecords = document.createElement("div");
          restRecords.className = "today-rest-records";
          todayRecordsList.appendChild(restRecords);
          renderRecordItems(dayRecords.slice(1), restRecords, 1);
        }

      } else {
        // ── Calendar view: render into diary-detail-panel's recordsList ──
        recordsList.innerHTML = "";
        recordsList.classList.toggle("has-records", Boolean(dayRecords.length));

        if (!dayRecords.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "이 날엔 아직 기록이 없어요. 마이크 버튼으로 생각을 남겨보세요 ✎";
          recordsList.appendChild(empty);
          return;
        }

        renderRecordItems(dayRecords, recordsList);
      }
    }

        edit.addEventListener("click", () => {

      editingRecordId = record.id;

      });

    function closeEditPanel() {

    async function saveEditingRecord() {
      if (!editingRecordId) return;
      const record = records.find((item) => item.id === editingRecordId);
      if (!record) {
        closeEditPanel();
        return;
      }

      editDeleteButton.disabled = true;
      editSaveButton.disabled = true;
      editCancelButton.disabled = true;

      const defaultTitle = createDefaultRecordTitle(new Date(record.createdAt));
      const updatedRecord = {
        ...record,
        title: editTitleInput.value.trim() || defaultTitle,
        transcript: editTranscriptInput.value.trim(),
        updatedAt: Date.now()
      };

      try {

    async function refreshRecords() {
      records = await getAllRecords();
      renderAll();
    }

    function showFileStatus(message) {
      if (fileStatus) fileStatus.textContent = message;
    }

    function makeBackupPayload(recordList) {
      return {
        app: "Speak your insight",
        version: 1,
        exportedAt: new Date().toISOString(),
        records: recordList
          .map(normalizeRecord)
          .sort((a, b) => a.createdAt - b.createdAt)
          .map((record) => ({
            id: record.id,
            date: record.date,
            createdAt: record.createdAt,
            updatedAt: record.updatedAt,
            title: record.title,
            transcript: record.transcript,
            duration: record.duration,
            syncStatus: SYNC_LOCAL_ONLY,
            lastSyncError: ""
          }))
      };
    }

    async function exportRecordsToFile() {
      const recordList = IS_PREVIEW_MODE ? records : await getAllRecords();
      const payload = makeBackupPayload(recordList);
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const todayKey = toDateKey(new Date());
      const link = document.createElement("a");
      link.href = url;
      link.download = `Speak your insight backup ${todayKey}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showFileStatus(`${payload.records.length}개의 기록을 파일로 저장했습니다.`);
      setStatus("파일 저장됨", false);
    }

    async function importRecordsFromFile(file) {
      if (!file) return;

      importFileButton.disabled = true;
      exportFileButton.disabled = true;
      showFileStatus("파일을 불러오는 중입니다.");

      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        const incoming = Array.isArray(payload) ? payload : payload.records;
        if (!Array.isArray(incoming)) {
          throw new Error("records array missing");
        }

        const currentRecords = IS_PREVIEW_MODE ? records : await getAllRecords();
        const currentById = new Map(currentRecords.map((record) => [record.id, record]));
        let importedCount = 0;

        for (const item of incoming) {
          const imported = normalizeRecord({
            ...item,
            syncStatus: SYNC_LOCAL_ONLY,
            lastSyncError: ""
          });
          const existing = currentById.get(imported.id);
          if (existing && existing.updatedAt > imported.updatedAt) continue;

          importedCount += 1;
          currentById.set(imported.id, imported);
          if (!IS_PREVIEW_MODE) await saveRecord(imported);
        }

        if (IS_PREVIEW_MODE) {
          records = [...currentById.values()].map(normalizeRecord);
          renderAll();
        } else {
          await refreshRecords();
        }

        showFileStatus(`${importedCount}개의 기록을 이 기기에 불러왔습니다.`);
        setStatus("파일 불러옴", false);
      } catch (error) {
        console.error(error);
        showFileStatus("파일을 불러오지 못했습니다. Speak your insight 백업 파일인지 확인해주세요.");
        setStatus("파일 오류", false);
      } finally {
        importFileButton.disabled = false;
        exportFileButton.disabled = false;
        importFileInput.value = "";
      }
    }

    async function startRecording() {
      if (currentView !== "recording") {
        setAppView("recording");
      }

      if (!IS_SECURE_APP_CONTEXT) {
        showMicMessage("휴대폰 Chrome에서 녹음하려면 HTTPS 배포 주소 또는 localhost 주소로 열어야 합니다. file:// 또는 일반 http 주소에서는 마이크가 막힐 수 있습니다.", "보안 주소 필요");
        return;
      }

      pendingRecording = null;
      setDraftReviewUi(false);
      micNotice.classList.remove("visible");
      speechNotice.classList.remove("visible");
      clearSpeechRecognitionTimers();

      finalTranscript = "";
      interimTranscript = "";
      recognitionBaseTranscript = "";
      recordingStart = Date.now();
      pausedAt = 0;
      pausedDuration = 0;
      isPaused = false;
      textOnlyRecording = false;
      mediaRecorder = null;

      if (speechSupported) {
        textOnlyRecording = true;
        isRecording = true;
        startSpeechRecognition();
        startTimer();
        updateTranscript();
        setRecordingUi(true);
        setStatus("기록 중", true);
        return;
      }

      showSpeechRecognitionNotice("이 브라우저에서는 음성 텍스트 변환이 지원되지 않습니다. Chrome 최신 버전 또는 https 주소에서 다시 열어주세요.");
      setStatus("텍스트 변환 미지원", false);
      return;

      if (!("MediaRecorder" in window)) {
        if (!speechSupported) {
          showMicMessage("이 브라우저에서는 음성 기록과 음성 텍스트 변환이 모두 지원되지 않습니다.");
          return;
        }

        textOnlyRecording = true;
        isRecording = true;
        startSpeechRecognition();
        startTimer();
        updateTranscript();
        setRecordingUi(true);
        setStatus("텍스트 기록 중", true);
        return;
      }

      try {
        activeStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
      } catch (error) {
        try {
          activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (fallbackError) {
          if (!speechSupported) {
            showMicMessage("마이크 권한이 필요합니다. 브라우저에서 권한을 허용한 뒤 다시 시도해 주세요.", "마이크 권한 필요");
            return;
          }

          textOnlyRecording = true;
          isRecording = true;
          startSpeechRecognition();
          startTimer();
          updateTranscript();
          setRecordingUi(true);
          setStatus("텍스트 기록 중", true);
          return;
        }
      }

      const mimeType = getSupportedAudioMimeType();
      try {
        mediaRecorder = mimeType
          ? new MediaRecorder(activeStream, { mimeType })
          : new MediaRecorder(activeStream);
      } catch (error) {
        cleanupActiveStream();
        if (!speechSupported) {
          showMicMessage("이 브라우저에서는 오디오 기록 형식이 지원되지 않습니다.");
          return;
        }

        textOnlyRecording = true;
        isRecording = true;
        startSpeechRecognition();
        startTimer();
        updateTranscript();
        setRecordingUi(true);
        setStatus("텍스트 기록 중", true);
        return;
      }

      mediaRecorder.addEventListener("error", (event) => {
        console.error("MediaRecorder error", event.error || event);
          showMicMessage("기록 중 오류가 발생했습니다. 텍스트가 인식되었다면 텍스트 기록은 저장할 수 있습니다.");
      });
      mediaRecorder.addEventListener("stop", handleRecordingStop);
      mediaRecorder.start(1000);

      isRecording = true;
      startSpeechRecognition();
      startTimer();
      updateTranscript();
      setRecordingUi(true);
      setStatus("기록 중", true);
    }

    function stopRecording() {
      if (!isRecording) return;
      if (isPaused) {
        resumeRecording();
      }
      isRecording = false;
      isPaused = false;
      stopTimer();
      setRecordingUi(false, "saving");
      setStatus("저장 중", false);
      clearSpeechRecognitionTimers();

      if (recognition) {
        recognition.onend = null;
        try {
          recognition.stop();
        } catch (error) {
          console.warn("Speech recognition stop failed", error);
        }
      }

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        return;
      }

      handleRecordingStop();
    }

    function pauseRecording() {
      if (!isRecording || isPaused) return;

      isPaused = true;
      pausedAt = Date.now();
      stopTimer();
      clearSpeechRecognitionTimers();

      if (mediaRecorder && mediaRecorder.state === "recording" && mediaRecorder.pause) {
        try {
          mediaRecorder.pause();
        } catch (error) {
          console.warn("MediaRecorder pause failed", error);
        }
      }

      if (recognition) {
        recognition.onend = null;
        try {
          recognition.stop();
        } catch (error) {
          console.warn("Speech recognition pause failed", error);
        }
      }

      setPausedUi(true);
      setStatus("잠시 멈춤", false);
    }

    function resumeRecording() {
      if (!isRecording || !isPaused) return;

      pausedDuration += Date.now() - pausedAt;
      pausedAt = 0;
      isPaused = false;

      if (mediaRecorder && mediaRecorder.state === "paused" && mediaRecorder.resume) {
        try {
          mediaRecorder.resume();
        } catch (error) {
          console.warn("MediaRecorder resume failed", error);
        }
      }

      startSpeechRecognition();
      startTimer();
      setPausedUi(false);
      setStatus("기록 중", true);
    }

    function togglePauseRecording() {
      if (isPaused) {
        resumeRecording();
      } else {
        pauseRecording();
      }
    }

    async function handleRecordingStop() {
      cleanupActiveStream();
      const duration = Math.round((Date.now() - recordingStart - pausedDuration) / 1000);
      await wait(450);
      await saveCompletedRecording(duration);
    }

    async function savePendingRecording() {
      if (isSavingPendingRecording) return;

      isSavingPendingRecording = true;
