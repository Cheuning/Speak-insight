      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: var(--space-2);
      }

      .status-pill {
        width: auto;
        justify-content: center;
      }

      .calendar-controls {
        align-items: center;
        flex-direction: row;
        gap: 8px;
      }

      .calendar-actions {
        width: auto;
        flex: 0 0 auto;
        justify-content: flex-end;
        gap: 10px;
      }

      .period-label-styled {
        flex: 1 1 auto;
        min-width: 0;
      }




      .day-entry-title {
        font-size: 9px;
      }

      .period-label-styled {
        font-size: 24px;
      }

      .app[data-view="recording"] .live-card {
        min-height: calc(100vh - 96px);
        padding-inline: var(--space-1);
      }

      .app[data-view="recording"] .transcript-box {
        min-height: 210px;
        font-size: 22px;
      }


      .mic-button {
        width: var(--bottom-cta-height);
        height: var(--bottom-cta-height);
      }

      .nav-item {
        width: 100%;
        height: 100%;
      }

      .nav-item span {
        display: block;
      }

      /* safe area 지원 (iPhone notch 등) */
      .bottom-nav {
        bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        max-width: calc(var(--app-width) - 32px);
        height: 68px;
      }
    }
  </style>
</head>
<body>
  <main class="app" data-view="today">
    <header class="topbar">
      <div class="date-strip" id="dateStrip"></div>
    </header>
    <div class="section-label" id="sectionLabel">오늘</div>

    <section class="card live-card" aria-labelledby="liveTitle">
      <button class="live-card-close-button" id="liveCardCloseButton" type="button" aria-label="기록 취소">×</button>

    const cloudSync = {
      isConfigured: false,
      currentUser: null,
      async upsertTextRecord(record) {
        if (!this.currentUser) return { skipped: true, reason: "not-signed-in" };

        await setDoc(
          doc(firestore, "users", this.currentUser.uid, "records", record.id),
          {
            ...record,
            userId: this.currentUser.uid
          },
          { merge: true }
        );

        return { synced: true };
      },
      async deleteTextRecord(id) {
        if (!this.currentUser) return { skipped: true, reason: "not-signed-in" };

        await deleteDoc(doc(firestore, "users", this.currentUser.uid, "records", id));
        return { deleted: true };
      },
      async fetchTextRecords() {
        if (!this.currentUser) return [];

        const snapshot = await getDocs(query(
          collection(firestore, "users", this.currentUser.uid, "records"),
          orderBy("createdAt", "desc")
        ));

        return snapshot.docs.map((snapshotDoc) => ({
          id: snapshotDoc.id,
          ...snapshotDoc.data()
        }));
      },
      async fetchProfile() {
        if (!this.currentUser) return null;

        const snapshot = await getDoc(doc(firestore, "users", this.currentUser.uid, "profile", "settings"));
        return snapshot.exists() ? snapshot.data() : null;
      },
      async saveProfile(profile) {
        if (!this.currentUser) return { skipped: true, reason: "not-signed-in" };

        await setDoc(
          doc(firestore, "users", this.currentUser.uid, "profile", "settings"),
          {
            ...profile,
            updatedAt: Date.now()
          },
          { merge: true }
        );

        return { saved: true };
      }
    };

    function openDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = () => {
          const database = request.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            const store = database.createObjectStore(STORE_NAME, { keyPath: "id" });
            store.createIndex("date", "date", { unique: false });
            store.createIndex("createdAt", "createdAt", { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function getAllRecords() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const request = tx.objectStore(STORE_NAME).getAll();
        request.onsuccess = () => resolve((request.result || []).map(normalizeRecord));
        request.onerror = () => reject(request.error);
      });
    }

    function saveRecord(record) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const request = tx.objectStore(STORE_NAME).put(normalizeRecord(record));
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    function deleteRecord(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const request = tx.objectStore(STORE_NAME).delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function saveRecordAndSync(record) {
      if (IS_PREVIEW_MODE) {
        const previewRecord = normalizeRecord({
          ...record,
          updatedAt: Date.now(),
          syncStatus: SYNC_LOCAL_ONLY,
          lastSyncError: ""
        });
        records = records.map((item) => item.id === previewRecord.id ? previewRecord : item);
        if (!records.some((item) => item.id === previewRecord.id)) records.unshift(previewRecord);
        renderAll();
        return;
      }

      const status = cloudSync.isConfigured && cloudSync.currentUser ? SYNC_PENDING : SYNC_LOCAL_ONLY;
      const localRecord = normalizeRecord({
        ...record,
        updatedAt: Date.now(),
        syncStatus: status,
        lastSyncError: ""
      });

      await saveRecord(localRecord);
      await refreshRecords();
      syncRecordToCloud(localRecord).catch((error) => {
        console.warn("Background cloud sync failed", error);
      });
    }

    async function deleteRecordEverywhere(record) {
      if (IS_PREVIEW_MODE) {
        records = records.filter((item) => item.id !== record.id);
        renderAll();
        return;
      }

      await deleteRecord(record.id);

      if (cloudSync.isConfigured && cloudSync.currentUser) {
        try {
          await cloudSync.deleteTextRecord(record.id);
        } catch (error) {
          console.warn("Cloud delete failed", error);
        }
      }

      await refreshRecords();
    }

    async function syncRecordToCloud(record) {
      if (!cloudSync.isConfigured || !cloudSync.currentUser) return;

      try {
        await cloudSync.upsertTextRecord(toCloudTextRecord(record));
        await saveRecord({
          ...record,
          syncStatus: SYNC_SYNCED,
          lastSyncError: ""
        });
        await refreshRecords();
      } catch (error) {
        await saveRecord({
          ...record,
          syncStatus: SYNC_ERROR,
          lastSyncError: error.message || "Cloud sync failed"
        });
        await refreshRecords();
      }
    }

    async function syncPendingRecords() {
      if (!cloudSync.isConfigured || !cloudSync.currentUser) return;

      const pendingRecords = (await getAllRecords()).filter((record) => (
        record.syncStatus === SYNC_PENDING || record.syncStatus === SYNC_ERROR || record.syncStatus === SYNC_LOCAL_ONLY
      ));

      for (const record of pendingRecords) {
        await syncRecordToCloud({
          ...record,
          syncStatus: SYNC_PENDING
        });
      }
    }

    async function mergeCloudTextRecords() {
      if (!cloudSync.isConfigured || !cloudSync.currentUser) return;

      const cloudRecords = await cloudSync.fetchTextRecords();
      const localRecords = await getAllRecords();
      const localById = new Map(localRecords.map((record) => [record.id, record]));

      for (const cloudRecord of cloudRecords) {
        const localRecord = localById.get(cloudRecord.id);
        if (localRecord && localRecord.updatedAt > cloudRecord.updatedAt) continue;

        await saveRecord({
          ...localRecord,
          ...cloudRecord,
          audioBlob: null,
          hasLocalAudio: false,
          syncStatus: SYNC_SYNCED,
          lastSyncError: ""
        });
      }

      await refreshRecords();
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dateKeyToDate(dateKey) {
      const [year, month, day] = String(dateKey || "").split("-").map(Number);
      if (!year || !month || !day) return startOfDay(new Date());
      return startOfDay(new Date(year, month - 1, day));
    }

    function createWeeklyHeatmapElement() {
      const container = document.createElement("div");
      container.className = "weekly-heatmap";

      const todayObj = new Date();
      const currentDay = todayObj.getDay(); // 0: 일요일, 1: 월요일, ...
      const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
      const monday = new Date(todayObj);
      monday.setDate(todayObj.getDate() + distanceToMonday);
      monday.setHours(0, 0, 0, 0);

      const weekdayLabels = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

      for (let i = 0; i < 7; i++) {
        const date = new Date(monday);
        date.setDate(monday.getDate() + i);

        const dateKey = toDateKey(date);
        const isToday = dateKey === toDateKey(new Date());
        
        // 데이터 캐시에서 해당 날짜 일기 존재 확인
        const dayRecords = records.filter(r => r.date === dateKey);
        const hasDiary = dayRecords.length > 0;

        const dayCol = document.createElement("div");
        dayCol.className = "heatmap-day";

        const label = document.createElement("span");
        label.className = "heatmap-label";
        label.textContent = weekdayLabels[i];
        dayCol.appendChild(label);

        const circle = document.createElement("div");
        circle.className = "heatmap-circle";
        if (isToday) circle.classList.add("is-today");

        if (hasDiary) {
          circle.classList.add("has-sticker");
          circle.innerHTML = getStickerSvg(dateKey);
        } else {
          const numSpan = document.createElement("span");
          numSpan.textContent = date.getDate();
          circle.appendChild(numSpan);
        }

        // 요일 서클 클릭 시 해당 날짜의 일기를 오늘 탭에서 조회하고 쓸 수 있도록 날짜 변경
        circle.addEventListener("click", (e) => {
          e.stopPropagation();
          selectedDate = startOfDay(date);
          viewDate = selectedDate;
          renderAll();
        });

        dayCol.appendChild(circle);
        container.appendChild(dayCol);
      }

      return container;
    }

    function formatDuration(seconds) {
      const total = Math.max(0, Math.round(seconds || 0));
      const mins = String(Math.floor(total / 60)).padStart(2, "0");
      const secs = String(total % 60).padStart(2, "0");
      return `${mins}:${secs}`;
    }

    function createId() {
      if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function normalizeRecord(record) {
      const createdAt = record.createdAt || Date.now();
      return {
        id: record.id || createId(),
        title: record.title || createDefaultRecordTitle(new Date(createdAt)) || DEFAULT_RECORD_TITLE,
        date: record.date || toDateKey(new Date(createdAt)),
        createdAt,
        updatedAt: record.updatedAt || createdAt,
        audioBlob: null,
        transcript: record.transcript || "",
        duration: record.duration || 0,
        hasLocalAudio: false,
        syncStatus: record.syncStatus || SYNC_LOCAL_ONLY,
        lastSyncError: record.lastSyncError || ""
      };
    }

    function toCloudTextRecord(record) {
      const normalized = normalizeRecord(record);
      return {
        id: normalized.id,
        date: normalized.date,
        createdAt: normalized.createdAt,
        updatedAt: normalized.updatedAt,
        title: normalized.title,
        transcript: normalized.transcript,
        duration: normalized.duration

      if (!("MediaRecorder" in window) || !MediaRecorder.isTypeSupported) return "";

        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4;codecs=mp4a.40.2",

        "audio/aac"
      ];

      return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      return hash;
    }

    function renderListView() {
      const listViewEl = document.getElementById("calendarListView");
      if (!listViewEl) return;
      listViewEl.innerHTML = "";

      const todayKey = toDateKey(new Date());
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const recordMap = {};
      records.forEach((r) => {
        if (!recordMap[r.date]) recordMap[r.date] = [];
        recordMap[r.date].push(r);
      });

      // 2. 날짜별 루프
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        const dateKey = toDateKey(date);
        const isToday = dateKey === todayKey;
        const dayRecords = (recordMap[dateKey] || []).sort((a, b) => a.createdAt - b.createdAt);

        // 기록이 없고 오늘이 아닌 날은 목록에서 생략

    function getMonthDays(date) {
      const first = new Date(date.getFullYear(), date.getMonth(), 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      return Array.from({ length: 42 }, (_, index) => {
        const day = new Date(start);
        day.setDate(start.getDate() + index);
        return day;
      });
    }

    function openEditPanel(record) {
      editingRecordId = record.id;
      editTitleInput.value = getRecordDisplayTitle(record);
      editTitleInput.placeholder = createDefaultRecordTitle(new Date(record.createdAt));
      editTranscriptInput.value = record.transcript || "";
      editPanel.hidden = false;
      requestAnimationFrame(() => {
        editTitleInput.focus();
        editTitleInput.select();
      });
    }

    function closeEditPanel() {
      editingRecordId = null;
      editPanel.hidden = true;
      editTitleInput.value = "";
      editTranscriptInput.value = "";
    }

    async function saveEditingRecord() {
      if (!editingRecordId) return;
      const record = records.find((item) => item.id === editingRecordId);
      if (!record) {
        closeEditPanel();
        return;
      }

      editDeleteButton.disabled = true;
      editSaveButton.disabled = true;
      editCancelButton.disabled = true;

      const defaultTitle = createDefaultRecordTitle(new Date(record.createdAt));
      const updatedRecord = {
        ...record,
        title: editTitleInput.value.trim() || defaultTitle,
        transcript: editTranscriptInput.value.trim(),
        updatedAt: Date.now()
      };

      try {
        await saveRecordAndSync(updatedRecord);
        setStatus("수정됨", false);
        closeEditPanel();
        if (diaryDetailPanel) diaryDetailPanel.classList.remove("open");
        setTimeout(() => {
          if (!isRecording) setStatus("대기 중", false);
        }, 1200);
      } catch (error) {
        console.error(error);
        setStatus("수정 오류", false);
      } finally {
        editDeleteButton.disabled = false;
        editSaveButton.disabled = false;
        editCancelButton.disabled = false;
      }
    }

    async function deleteEditingRecord() {
      if (!editingRecordId) return;
      const record = records.find((item) => item.id === editingRecordId);
      if (!record) {
        closeEditPanel();
        return;
      }

      editDeleteButton.disabled = true;
      editSaveButton.disabled = true;
      editCancelButton.disabled = true;

      try {
        await deleteRecordEverywhere(record);
        setStatus("삭제됨", false);

        editCancelButton.disabled = false;
      }

          duration: 25,

        });

        yesterday.setDate(now.getDate() - 1);

    function showFileStatus(message) {
      if (fileStatus) fileStatus.textContent = message;
    }

    function makeBackupPayload(recordList) {
      return {
        app: "Speak your insight",
        version: 1,
        exportedAt: new Date().toISOString(),
        records: recordList
          .map(normalizeRecord)
          .sort((a, b) => a.createdAt - b.createdAt)
          .map((record) => ({
            id: record.id,
            date: record.date,
            createdAt: record.createdAt,
            updatedAt: record.updatedAt,
            title: record.title,
            transcript: record.transcript,
            duration: record.duration,
            syncStatus: SYNC_LOCAL_ONLY,
            lastSyncError: ""
          }))
      };
    }

    async function exportRecordsToFile() {
      const recordList = IS_PREVIEW_MODE ? records : await getAllRecords();
      const payload = makeBackupPayload(recordList);
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const todayKey = toDateKey(new Date());
      const link = document.createElement("a");
      link.href = url;
      link.download = `Speak your insight backup ${todayKey}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showFileStatus(`${payload.records.length}개의 기록을 파일로 저장했습니다.`);
      setStatus("파일 저장됨", false);
    }

    async function importRecordsFromFile(file) {
      if (!file) return;

      importFileButton.disabled = true;
      exportFileButton.disabled = true;
      showFileStatus("파일을 불러오는 중입니다.");

      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        const incoming = Array.isArray(payload) ? payload : payload.records;
        if (!Array.isArray(incoming)) {
          throw new Error("records array missing");
        }

        const currentRecords = IS_PREVIEW_MODE ? records : await getAllRecords();
        const currentById = new Map(currentRecords.map((record) => [record.id, record]));
        let importedCount = 0;

        for (const item of incoming) {
          const imported = normalizeRecord({
            ...item,
            syncStatus: SYNC_LOCAL_ONLY,
            lastSyncError: ""
          });
          const existing = currentById.get(imported.id);
          if (existing && existing.updatedAt > imported.updatedAt) continue;

          importedCount += 1;
          currentById.set(imported.id, imported);
          if (!IS_PREVIEW_MODE) await saveRecord(imported);
        }

        if (IS_PREVIEW_MODE) {
          records = [...currentById.values()].map(normalizeRecord);
          renderAll();
        } else {
          await refreshRecords();
        }

        showFileStatus(`${importedCount}개의 기록을 이 기기에 불러왔습니다.`);
        setStatus("파일 불러옴", false);
      } catch (error) {
        console.error(error);
        showFileStatus("파일을 불러오지 못했습니다. Speak your insight 백업 파일인지 확인해주세요.");
        setStatus("파일 오류", false);
      } finally {
        importFileButton.disabled = false;
        exportFileButton.disabled = false;
        importFileInput.value = "";
      }
    }

    async function startRecording() {
      recordingTargetDate = currentView === "records" ? startOfDay(selectedDate) : startOfDay(new Date());

      // Update date badge at the top of the recording window
      const dateBadge = document.getElementById("recordingDateBadge");
      if (dateBadge) {
        dateBadge.textContent = new Intl.DateTimeFormat("ko-KR", {
          year: "numeric",
          month: "long",
          day: "numeric"
        }).format(recordingTargetDate);
      }

      if (currentView !== "recording") {
        setAppView("recording");
      }

      if (!IS_SECURE_APP_CONTEXT) {
        showMicMessage("휴대폰 Chrome에서 녹음하려면 HTTPS 배포 주소 또는 localhost 주소로 열어야 합니다. file:// 또는 일반 http 주소에서는 마이크가 막힐 수 있습니다.", "보안 주소 필요");
        return;
      }

      pendingRecording = null;
      setDraftReviewUi(false);
      micNotice.classList.remove("visible");
      speechNotice.classList.remove("visible");
      clearSpeechRecognitionTimers();

      finalTranscript = "";
      interimTranscript = "";
      recognitionBaseTranscript = "";
      recordingStart = Date.now();
      pausedAt = 0;
      pausedDuration = 0;
      isPaused = false;
      textOnlyRecording = false;
      mediaRecorder = null;
      recordingStopHandled = false;
      clearTimeout(recordingStopFallbackTimer);
      recordingStopFallbackTimer = null;

      if (speechSupported) {
        textOnlyRecording = true;
        isRecording = true;
        startSpeechRecognition();
        startTimer();
        updateTranscript();
        setRecordingUi(true);
        setStatus("기록 중", true);
        return;
      }

      showSpeechRecognitionNotice("이 브라우저에서는 음성 텍스트 변환이 지원되지 않습니다. Chrome 최신 버전 또는 https 주소에서 다시 열어주세요.");
      setStatus("텍스트 변환 미지원", false);
      return;

      if (!("MediaRecorder" in window)) {
        if (!speechSupported) {
          showMicMessage("이 브라우저에서는 음성 기록과 음성 텍스트 변환이 모두 지원되지 않습니다.");
          return;
        }

        textOnlyRecording = true;
        isRecording = true;
        startSpeechRecognition();
        startTimer();
        updateTranscript();
        setRecordingUi(true);
        setStatus("텍스트 기록 중", true);
        return;
      }

      try {
        activeStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
      } catch (error) {
        try {
          activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (fallbackError) {
          if (!speechSupported) {
            showMicMessage("마이크 권한이 필요합니다. 브라우저에서 권한을 허용한 뒤 다시 시도해 주세요.", "마이크 권한 필요");
            return;
          }

          textOnlyRecording = true;
          isRecording = true;
          startSpeechRecognition();
          startTimer();
          updateTranscript();
          setRecordingUi(true);
          setStatus("텍스트 기록 중", true);
          return;
        }
      }

      const mimeType = getSupportedAudioMimeType();
      try {
        mediaRecorder = mimeType
          ? new MediaRecorder(activeStream, { mimeType })
          : new MediaRecorder(activeStream);
      } catch (error) {
        cleanupActiveStream();
        if (!speechSupported) {
          showMicMessage("이 브라우저에서는 오디오 기록 형식이 지원되지 않습니다.");
          return;
        }

        textOnlyRecording = true;
        isRecording = true;
        startSpeechRecognition();
        startTimer();
        updateTranscript();
        setRecordingUi(true);
        setStatus("텍스트 기록 중", true);
        return;
      }

      mediaRecorder.addEventListener("error", (event) => {
        console.error("MediaRecorder error", event.error || event);
          showMicMessage("기록 중 오류가 발생했습니다. 텍스트가 인식되었다면 텍스트 기록은 저장할 수 있습니다.");
      });
      mediaRecorder.addEventListener("stop", handleRecordingStop);
      mediaRecorder.start(1000);

      isRecording = true;
      startSpeechRecognition();
      startTimer();
      updateTranscript();
      setRecordingUi(true);
      setStatus("기록 중", true);
    }

    function stopRecording() {
      if (!isRecording) {
        if (currentView === "recording") {
          setRecordingUi(false, "saving");
          setStatus("저장 중", false);
          handleRecordingStop();
        }
        return;
      }
      if (isPaused) {
        resumeRecording();
      }
      isRecording = false;
      isPaused = false;
      stopTimer();
      setRecordingUi(false, "saving");
      setStatus("저장 중", false);
      clearSpeechRecognitionTimers();

      if (recognition) {
        recognition.onend = null;
        try {
          recognition.stop();
        } catch (error) {
          console.warn("Speech recognition stop failed", error);
        }
      }

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        try {
          mediaRecorder.stop();
          clearTimeout(recordingStopFallbackTimer);
          recordingStopFallbackTimer = setTimeout(() => {
            handleRecordingStop();
          }, 900);
        } catch (error) {
          console.warn("MediaRecorder stop failed", error);
          handleRecordingStop();
        }
        return;
      }

      handleRecordingStop();
    }

    function pauseRecording() {
      if (!isRecording || isPaused) return;

      isPaused = true;
      pausedAt = Date.now();
      stopTimer();
      clearSpeechRecognitionTimers();

      if (mediaRecorder && mediaRecorder.state === "recording" && mediaRecorder.pause) {
        try {
          mediaRecorder.pause();
        } catch (error) {
          console.warn("MediaRecorder pause failed", error);
        }
      }

      if (recognition) {
        recognition.onend = null;
        try {
          recognition.stop();
        } catch (error) {
          console.warn("Speech recognition pause failed", error);
        }
      }

      setPausedUi(true);
      setStatus("잠시 멈춤", false);
    }

    function resumeRecording() {
      if (!isRecording || !isPaused) return;

      pausedDuration += Date.now() - pausedAt;
      pausedAt = 0;
      isPaused = false;

      if (mediaRecorder && mediaRecorder.state === "paused" && mediaRecorder.resume) {
        try {
          mediaRecorder.resume();
        } catch (error) {
          console.warn("MediaRecorder resume failed", error);
        }
      }

      startSpeechRecognition();
      startTimer();
      setPausedUi(false);
      setStatus("기록 중", true);
    }

    function togglePauseRecording() {
      if (isPaused) {
        resumeRecording();
      } else {
        pauseRecording();
      }
    }

    async function handleRecordingStop() {
      if (recordingStopHandled) return;
      recordingStopHandled = true;
      clearTimeout(recordingStopFallbackTimer);
      recordingStopFallbackTimer = null;
      cleanupActiveStream();
      const duration = Math.max(0, Math.round((Date.now() - (recordingStart || Date.now()) - pausedDuration) / 1000));
      await wait(450);
      try {
        await saveCompletedRecording(duration);
      } catch (error) {
        console.error("Recording review transition failed", error);
        pendingRecording = buildPendingRecord(duration);
        selectedDate = dateKeyToDate(pendingRecording.date);

    function clearSpeechRecognitionTimers() {
      clearTimeout(recognitionRestartTimer);
      clearTimeout(speechHelpTimer);
      recognitionRestartTimer = null;
      speechHelpTimer = null;
    }

    function showSpeechRecognitionNotice(message) {
      speechNotice.textContent = message;
      speechNotice.classList.add("visible");
    }

    function normalizeSpeechText(text) {
      return (text || "").replace(/\s+/g, " ").trim();
    }

    function appendSpeechText(base, addition) {
      const current = normalizeSpeechText(base);
      const next = normalizeSpeechText(addition);
      if (!current) return next;
      if (!next) return current;
      if (current.endsWith(next)) return current;
      if (next.startsWith(current)) return next;

      const maxOverlap = Math.min(current.length, next.length);
      for (let length = maxOverlap; length > 1; length -= 1) {
        if (current.slice(-length) === next.slice(0, length)) {
          return normalizeSpeechText(`${current}${next.slice(length)}`);
        }
      }

      return `${current} ${next}`;
    }

    function collapseSpeechSegments(segments) {
      return segments.reduce((merged, segment) => appendSpeechText(merged, segment), "");
    }

    function startSpeechRecognition() {
      if (!speechSupported) {
        showSpeechRecognitionNotice("이 브라우저에서는 음성 텍스트 변환이 지원되지 않습니다.");
        return;
      }

      clearSpeechRecognitionTimers();
      speechNotice.classList.remove("visible");
      recognitionBaseTranscript = finalTranscript.trim();
      recognition = new SpeechRecognition();
      recognition.lang = "ko-KR";
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        speechHelpTimer = setTimeout(() => {
          if (isRecording && !finalTranscript.trim() && !interimTranscript.trim()) {
            showSpeechRecognitionNotice("마이크는 켜졌지만 아직 텍스트가 들어오지 않았습니다. 휴대폰에서는 Chrome의 Google 음성 인식이 잠시 늦거나 막힐 수 있어요. 계속 말해보고, 안 되면 기록 마치기 후 내용 칸에 직접 적을 수 있습니다.");
          }
        }, SPEECH_HELP_DELAY_MS);
      };

      recognition.onresult = (event) => {
        clearTimeout(speechHelpTimer);
        speechHelpTimer = null;
        const sessionFinalSegments = [];
        const interimSegments = [];
        interimTranscript = "";
        for (let i = 0; i < event.results.length; i += 1) {
          const text = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            sessionFinalSegments.push(text);
          } else {
            interimSegments.push(text);
          }
        }
        const sessionFinalTranscript = collapseSpeechSegments(sessionFinalSegments);
        interimTranscript = collapseSpeechSegments(interimSegments);
        finalTranscript = appendSpeechText(recognitionBaseTranscript, sessionFinalTranscript);
        updateTranscript();
      };

      recognition.onerror = (event) => {
        interimTranscript = "";
        updateTranscript();

        const errorType = event?.error || "";
        if (errorType === "not-allowed" || errorType === "service-not-allowed") {
          recognition.onend = null;
          showSpeechRecognitionNotice("음성 텍스트 변환 권한이 막혔습니다. Chrome 사이트 설정에서 마이크를 허용하고, 가능하면 https 주소로 다시 열어주세요.");
          return;
        }

        if (errorType === "network") {
          showSpeechRecognitionNotice("음성 텍스트 변환 서버에 연결하지 못했습니다. 모바일 데이터나 와이파이 연결을 확인해주세요.");
          return;
        }

        if (errorType === "no-speech") {
          showSpeechRecognitionNotice("아직 인식된 말이 없습니다. 조금 더 가까이, 또렷하게 말해보세요.");
        }
      };

      recognition.onend = () => {
        if (!isRecording || isPaused) return;
        recognitionRestartTimer = setTimeout(() => {
          if (!isRecording || isPaused || !recognition) return;
          try {
            recognitionBaseTranscript = finalTranscript.trim();
            recognition.start();
          } catch (error) {
            showSpeechRecognitionNotice("음성 텍스트 변환이 잠시 멈췄습니다. 기록 마치기 후 내용 칸에서 직접 이어 적을 수 있습니다.");
          }
        }, SPEECH_RESTART_DELAY_MS);
      };

      try {
        recognition.start();
      } catch (error) {
        showSpeechRecognitionNotice("음성 텍스트 변환을 시작하지 못했습니다. 페이지를 새로고침한 뒤 다시 시도해주세요.");
      }
    }

    function updateTranscript() {
      const finalText = finalTranscript.trim();
      const interimText = interimTranscript.trim();

      if (!finalText && !interimText) {
        transcriptBox.classList.add("empty");
        transcriptBox.textContent = isRecording ? "듣고 있습니다..." : "기록 버튼을 누르면 음성 텍스트 변환이 시작됩니다.";
        return;
      }

      transcriptBox.classList.remove("empty");
      transcriptBox.innerHTML = "";

      if (finalText) {
        transcriptBox.append(document.createTextNode(finalText));
      }

      if (interimText) {
        let visibleInterimText = interimText;
        if (finalText && interimText.startsWith(finalText)) {
          visibleInterimText = interimText.slice(finalText.length).trim();
        }
        if (!visibleInterimText) return;
        if (finalText) transcriptBox.append(document.createTextNode(" "));
        const interim = document.createElement("span");
        interim.className = "interim";
        interim.textContent = visibleInterimText;
        transcriptBox.appendChild(interim);
      }
    }

    /**
     * initCustomSelect — 범용 커스텀 셀렉트 초기화
     * @param {string} wrapId   — .cst-select-wrap 요소 ID
     * @param {string} btnId    — trigger button ID
     * @param {string} labelId  — label span ID
     * @param {{ value: string, label: string, hint?: string }[]} options
     * @param {string} initialValue
     * @param {(value: string) => void} onChange
     */
    function initCustomSelect({ wrapId, btnId, labelId, options, initialValue, onChange }) {
      const wrap = document.getElementById(wrapId);
      const btn  = document.getElementById(btnId);
      const labelEl = document.getElementById(labelId);
      if (!wrap || !btn || !labelEl) return;

      let currentValue = initialValue;
      let popup = null;

      function getLabelFor(val) {
        const found = options.find(o => o.value === val);
        return found ? found.label : val;
      }

      function setDisplay(val) {
        currentValue = val;
        labelEl.textContent = getLabelFor(val);
      }

      function buildPopup() {
        const el = document.createElement("div");
        el.className = "cst-select-popup";
        el.setAttribute("role", "listbox");
        options.forEach(opt => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "cst-select-opt";
          item.setAttribute("role", "option");
          item.setAttribute("aria-selected", opt.value === currentValue ? "true" : "false");
          item.dataset.value = opt.value;
          // hint text if provided (e.g. font preview)
          if (opt.hint) {
            item.style.fontFamily = opt.hint;
          }
          item.textContent = opt.label;
          item.addEventListener("click", () => {
            setDisplay(opt.value);
            closePopup();
            onChange(opt.value);
          });
          el.appendChild(item);
        });
        return el;
      }

      function openPopup() {
        if (popup) { closePopup(); return; }
        popup = buildPopup();
        wrap.appendChild(popup);
        btn.setAttribute("aria-expanded", "true");
      }

      function closePopup() {
        if (popup) { popup.remove(); popup = null; }
        btn.setAttribute("aria-expanded", "false");
      }

      btn.addEventListener("click", e => { e.stopPropagation(); openPopup(); });
      document.addEventListener("click", e => { if (popup && !wrap.contains(e.target)) closePopup(); });
      document.addEventListener("keydown", e => { if (e.key === "Escape" && popup) closePopup(); });

      // initialize display
      setDisplay(currentValue);

      // expose set method for external updates
      wrap._setValue = (val) => setDisplay(val);
    }

    // Font choice using initCustomSelect
    async function ensureFontLoaded(fontKey) {
      const font = FONT_OPTIONS[fontKey];
      if (!font || !font.source || !font.family || !("FontFace" in window) || !document.fonts || loadedFontKeys.has(fontKey)) {
        return;
      }

      try {
        const alreadyLoaded = Array.from(document.fonts).some((face) => face.family === font.family && face.status === "loaded");
        if (!alreadyLoaded) {
          const face = new FontFace(font.family, `url("${font.source}") format("truetype")`, {
            weight: "400",
            style: "normal"
          });
          const loadedFace = await face.load();
          document.fonts.add(loadedFace);
        }
        await document.fonts.load(`18px "${font.family}"`);
        loadedFontKeys.add(fontKey);
      } catch (error) {
        console.warn("Font load failed", fontKey, error);
      }
    }

    function applyFontChoice(fontKey) {
      const safeFontKey = FONT_OPTIONS[fontKey] ? fontKey : "myoeunddobak";
      document.documentElement.style.setProperty("--font-hand", FONT_OPTIONS[safeFontKey].css);
      localStorage.setItem(FONT_STORAGE_KEY, safeFontKey);
      ensureFontLoaded(safeFontKey).then(() => {
        document.documentElement.style.setProperty("--font-hand", FONT_OPTIONS[safeFontKey].css);
      });
    }

    function initFontChoice() {
      const savedFont = localStorage.getItem(FONT_STORAGE_KEY) || "myoeunddobak";
      const fontOptions = Object.entries(FONT_OPTIONS)
        .sort(([, a], [, b]) => a.label.localeCompare(b.label, "ko-KR", { sensitivity: "base" }))
        .map(([key, font]) => ({ value: key, label: font.label, hint: font.css }));

      initCustomSelect({
        wrapId: "fontSelectWrap",
        btnId: "fontSelectBtn",
        labelId: "fontSelectLabel",
        options: fontOptions,
        initialValue: savedFont,
        onChange: (val) => applyFontChoice(val)
      });
      applyFontChoice(savedFont);
    }

    function initUserProfile() {
      // 1. 프로필 아바타 & 닉네임 로드 (비어 있을 경우 체크용 임시 가상 프로필 자동 주입)

        savedAvatar = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23E8F5E9"/><circle cx="50" cy="38" r="16" fill="%2381C784"/><path d="M50 38 Q 45 43 50 48" fill="none" stroke="%231b5e20" stroke-width="2.5" stroke-linecap="round"/><path d="M22 82 C22 66 34 58 50 58 C66 58 78 66 78 82" fill="%2381C784"/><circle cx="45" cy="35" r="2" fill="%231b5e20"/><circle cx="55" cy="35" r="2" fill="%231b5e20"/></svg>`;

      }

      if (savedAvatar && profileAvatarPreview) {
        profileAvatarPreview.innerHTML = `<img src="${savedAvatar}" alt="사용자 아바타" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
      }

      // 2. 아바타 클릭 시 갤러리/카메라 활성화
      if (profileAvatarContainer && profileAvatarInput) {
        profileAvatarContainer.addEventListener("click", () => {
          profileAvatarInput.click();
        });
      }

      // 3. 이미지 업로드 시 스마트 중앙 정사각형 크롭 & Canvas 고효율 압축 변환
      if (profileAvatarInput) {
        profileAvatarInput.addEventListener("change", (e) => {
          const file = e.target.files?.[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const size = 120; // 120x120 크기로 제한하여 퍼포먼스 극대화
              canvas.width = size;
              canvas.height = size;
              
              const ctx = canvas.getContext("2d");
              const minSide = Math.min(img.width, img.height);
              const sx = (img.width - minSide) / 2;
              const sy = (img.height - minSide) / 2;
              
              ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);
              
              const base64Data = canvas.toDataURL("image/jpeg", 0.85); // 85% 압축률
              pendingAvatarDataUrl = base64Data;
              
              // 로컬 미리보기 갱신
              if (profileAvatarPreview) {
                profileAvatarPreview.innerHTML = `<img src="${base64Data}" alt="사용자 아바타" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
              }
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      // 4. 프로필 정보 영구 로컬 저장 및 화면 즉시 업데이트
      if (profileSaveBtn) {
        profileSaveBtn.addEventListener("click", () => {
          saveUserProfile();
        });
      }
    }

    function saveUserProfile() {
      const name = profileNicknameInput.value.trim();
      localStorage.setItem(PROFILE_NICKNAME_KEY, name);

      if (pendingAvatarDataUrl) {
        localStorage.setItem(AVATAR_STORAGE_KEY, pendingAvatarDataUrl);
        pendingAvatarDataUrl = ""; // 임시 변수 초기화
      }

      setStatus("프로필 저장됨", false);
      renderAll(); // 오늘 탭의 글로벌 헤더 웰컴 문구 & 아바타 즉시 리렌더링

      setTimeout(() => {
        if (!isRecording) setStatus("대기 중", false);
      }, 1200);
    }

    // ── Custom Period Picker Popup ──────────────────────────────────────────
    (function initPeriodPicker() {
      const pickerBtn = document.getElementById("periodPickerBtn");
      const container = document.getElementById("periodSelectorContainer");
      if (!pickerBtn || !container) return;

      let pickerYear = viewDate.getFullYear(); // year shown in popup
      let popup = null;

      const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
      const NOW = new Date();

      function buildPopup() {
        const el = document.createElement("div");
        el.className = "period-picker-popup";
        el.setAttribute("role", "dialog");
        el.setAttribute("aria-modal", "false");

        // Year nav
        const yearNav = document.createElement("div");
        yearNav.className = "picker-year-nav";

        const prevYearBtn = document.createElement("button");
        prevYearBtn.type = "button";
        prevYearBtn.className = "picker-year-arrow";
        prevYearBtn.setAttribute("aria-label", "이전 년도");
        prevYearBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="15 18 9 12 15 6"/></svg>';
        prevYearBtn.addEventListener("click", () => {
          pickerYear -= 1;
          refreshPopup();
        });

        const yearLabel = document.createElement("span");
        yearLabel.className = "picker-year-label";
        yearLabel.textContent = `${pickerYear}년`;

        const nextYearBtn = document.createElement("button");
        nextYearBtn.type = "button";
        nextYearBtn.className = "picker-year-arrow";
        nextYearBtn.setAttribute("aria-label", "다음 년도");
        nextYearBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="9 18 15 12 9 6"/></svg>';
        nextYearBtn.addEventListener("click", () => {
          pickerYear += 1;
          refreshPopup();
        });

        yearNav.append(prevYearBtn, yearLabel, nextYearBtn);
        el.appendChild(yearNav);

        // Month grid
        const grid = document.createElement("div");
        grid.className = "picker-month-grid";
        MONTHS.forEach((name, idx) => {
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = "picker-month-cell";
          cell.textContent = name;
          cell.dataset.month = idx;
          const isCurMonth = pickerYear === NOW.getFullYear() && idx === NOW.getMonth();
          if (isCurMonth) cell.classList.add("is-current-month");
          if (pickerYear === viewDate.getFullYear() && idx === viewDate.getMonth()) {
            cell.classList.add("is-selected");
          }
          cell.addEventListener("click", () => {
            viewDate = new Date(pickerYear, idx, 1);
            closePicker();
            updatePeriodLabelDisplay();
            renderCalendar();
          });
          grid.appendChild(cell);
        });
        el.appendChild(grid);

        return el;
      }

      function refreshPopup() {
        if (!popup) return;
        const newPopup = buildPopup();
        container.replaceChild(newPopup, popup);
        popup = newPopup;
      }

      function openPicker() {
        if (popup) { closePicker(); return; }
        pickerYear = viewDate.getFullYear();
        popup = buildPopup();
        container.appendChild(popup);
        pickerBtn.setAttribute("aria-expanded", "true");
      }

      function closePicker() {
        if (popup) { popup.remove(); popup = null; }
        pickerBtn.setAttribute("aria-expanded", "false");
      }

      pickerBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openPicker();
      });

      document.addEventListener("click", (e) => {
        if (popup && !container.contains(e.target)) closePicker();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && popup) closePicker();
      });
    })();


    // calendar-view-dropdown event listeners
    const viewToggleButton = document.getElementById("viewToggleButton");
    const viewDropdownMenu = document.getElementById("viewDropdownMenu");
    const optMonthView = document.getElementById("optMonthView");
    const optListView = document.getElementById("optListView");
    const viewToggleLabel = document.getElementById("viewToggleLabel");

    if (viewToggleButton && viewDropdownMenu) {
      viewToggleButton.addEventListener("click", (e) => {
        e.stopPropagation();
        const isExpanded = viewToggleButton.getAttribute("aria-expanded") === "true";
        viewToggleButton.setAttribute("aria-expanded", !isExpanded);
        viewDropdownMenu.hidden = isExpanded;
      });

      const setCalendarMode = (mode) => {
        calendarMode = mode; // "month" or "list"
        const isList = mode === "list";
        
        optMonthView.classList.toggle("active", !isList);
        optListView.classList.toggle("active", isList);
        if (viewToggleLabel) {
          viewToggleLabel.textContent = isList ? "목록 보기" : "월간 보기";
        }
        
        viewToggleButton.setAttribute("aria-expanded", "false");
        viewDropdownMenu.hidden = true;
        
        renderCalendar();
      };

      if (optMonthView) {
        optMonthView.addEventListener("click", (e) => {
          e.stopPropagation();
          setCalendarMode("month");
        });
      }

      if (optListView) {
        optListView.addEventListener("click", (e) => {
          e.stopPropagation();
          setCalendarMode("list");
        });
      }

      // Close dropdown on outside click
      document.addEventListener("click", (e) => {
        if (!viewToggleButton.contains(e.target) && !viewDropdownMenu.contains(e.target)) {
          viewToggleButton.setAttribute("aria-expanded", "false");
          viewDropdownMenu.hidden = true;
        }
      });
    }


    todayButton.addEventListener("click", () => {
      setAppView("today", { scrollBehavior: "auto" });
    });

    calendarButton.addEventListener("click", () => {
      setAppView("records");
    });

    settingsButton.addEventListener("click", () => {
      setAppView("settings");
    });

    // Cozy hand-drawn diary stats popup/tooltip handler
    statsButton.addEventListener("click", (e) => {
      e.stopPropagation();
      let tooltip = document.getElementById("statsTooltip");
      if (tooltip) {
        tooltip.classList.toggle("visible");
        if (tooltip.classList.contains("visible")) {
          updateStatsContent();
        }
        return;
      }
      
      tooltip = document.createElement("div");
      tooltip.id = "statsTooltip";
      tooltip.className = "stats-tooltip card paper-lines";
      document.body.appendChild(tooltip);
      
      function updateStatsContent() {
        const totalEntries = records ? records.length : 0;
        let totalWords = 0;
        if (records) {
          records.forEach(r => {
            if (r.transcript) {
              totalWords += r.transcript.trim().split(/\s+/).filter(w => w.length > 0).length;
            }
          });
        }
        
        tooltip.innerHTML = `
          <div class="stats-tooltip-header">
            <h3>✎ 생각의 흔적</h3>
          </div>
          <div class="stats-tooltip-body">
            <p>📅 <strong>기록한 생각:</strong> ${totalEntries}개</p>
            <p>✍️ <strong>기록한 단어:</strong> ${totalWords}개</p>
            <p>✨ <strong>오늘의 통계:</strong> 참 잘했어요!</p>
          </div>
        `;
      }
      
      updateStatsContent();
      
      const rect = statsButton.getBoundingClientRect();
      tooltip.style.left = `${rect.left + rect.width / 2 - 115}px`;
      tooltip.style.bottom = `${window.innerHeight - rect.top + 12}px`;
      
      // Force layout and trigger animation
      tooltip.offsetHeight;
      tooltip.classList.add("visible");
    });
    
    document.addEventListener("click", () => {
      const tooltip = document.getElementById("statsTooltip");
      if (tooltip) {
        tooltip.classList.remove("visible");
      }
    });

    // Close diary detail panel
    if (diaryDetailClose) {
      diaryDetailClose.addEventListener("click", () => {
        diaryDetailPanel.classList.remove("open");
        // Deselect all calendar cells
        calendarGrid.querySelectorAll(".day-cell.selected").forEach((c) => c.classList.remove("selected"));
      });
    }

    exportFileButton.addEventListener("click", () => {
      exportRecordsToFile();
    });

    importFileButton.addEventListener("click", () => {
      importFileInput.click();
    });

    importFileInput.addEventListener("change", () => {
      importRecordsFromFile(importFileInput.files?.[0]);
    });


    function showConfirmRecordModal() {
      if (!confirmRecordModal || !confirmRecordDateText) return;
      confirmRecordDateText.textContent = formatKoreanDate(startOfDay(selectedDate));
      confirmRecordModal.hidden = false;
    }

    function hideConfirmRecordModal() {
      if (confirmRecordModal) {
        confirmRecordModal.hidden = true;
      }
    }

    if (confirmRecordCancelBtn) {
      confirmRecordCancelBtn.addEventListener("click", () => {
        hideConfirmRecordModal();
      });
    }

    if (confirmRecordStartBtn) {
      confirmRecordStartBtn.addEventListener("click", () => {
        hideConfirmRecordModal();
        startRecording();
      });
    }

    if (confirmRecordModal) {
      confirmRecordModal.addEventListener("click", (e) => {
        if (e.target === confirmRecordModal) {
          hideConfirmRecordModal();
        }
      });
    }

    micButton.addEventListener("click", () => {
      if (isRecording) {
        stopRecording();
      } else {
        if (currentView === "records") {
          showConfirmRecordModal();
        } else {
          startRecording();
        }
      }
    });

    recordingStopButton.addEventListener("click", () => {
      stopRecording();
    });

    recordingPauseButton.addEventListener("click", () => {
      togglePauseRecording();
    });

    saveDraftButton.addEventListener("click", () => {
      savePendingRecording();
    });

    cancelDraftButton.addEventListener("click", () => {
      cancelPendingRecording();
    });

    if (liveCardCloseButton) {
      liveCardCloseButton.addEventListener("click", () => {
        isRecording = false;
        isPaused = false;
        recordingStopHandled = true;
        clearTimeout(recordingStopFallbackTimer);
        recordingStopFallbackTimer = null;
        stopTimer();
        clearSpeechRecognitionTimers();

        if (recognition) {
          recognition.onend = null;
          try {
            recognition.stop();
          } catch (e) {}
        }

        if (mediaRecorder) {
          mediaRecorder.removeEventListener("stop", handleRecordingStop);
          if (mediaRecorder.state !== "inactive") {
            try { mediaRecorder.stop(); } catch (e) {}
          }
        }
        cleanupActiveStream();
        cancelPendingRecording();
      });
    }

    editCancelButton.addEventListener("click", () => {
      closeEditPanel();
    });

    editSaveButton.addEventListener("click", () => {
      saveEditingRecord();
    });

    editDeleteButton.addEventListener("click", () => {
      deleteEditingRecord();
    });

    editPanel.addEventListener("click", (event) => {
      if (event.target === editPanel) closeEditPanel();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !editPanel.hidden) closeEditPanel();
    });

    draftTitleInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        savePendingRecording();
      }
    });

    async function init() {
      initFontChoice();
      initThemeChoice();
      initStickerChoice();
      initUserProfile();
      renderDateStrip();
      setAppView("today");

      if (!("MediaRecorder" in window) && !speechSupported) {
        micNotice.textContent = "이 브라우저에서는 음성 기록과 음성 텍스트 변환이 모두 지원되지 않습니다.";
        micNotice.classList.add("visible");
        micButton.disabled = true;
      } else if (!IS_SECURE_APP_CONTEXT) {
        micNotice.textContent = "휴대폰 Chrome 녹음은 HTTPS 배포 주소 또는 localhost에서만 안정적으로 작동합니다.";
        micNotice.classList.add("visible");
      } else if (!("MediaRecorder" in window)) {
        micNotice.textContent = "이 브라우저에서는 오디오 저장이 지원되지 않아 텍스트 기록만 작동합니다.";
        micNotice.classList.add("visible");
      } else if (!("mediaDevices" in navigator) || !("getUserMedia" in navigator.mediaDevices)) {
        micNotice.textContent = "이 브라우저에서는 오디오 기록이 제한될 수 있습니다. 음성 텍스트 변환이 지원되면 텍스트 기록만 작동합니다.";
        micNotice.classList.add("visible");
      }

      if (!speechSupported) {
        speechNotice.classList.add("visible");
      }

      if (loadPreviewRecords()) return;

      db = await openDatabase();
      await refreshRecords();
      setAppView("today", { scrollBehavior: "auto" });
    }

    window.addEventListener("load", () => {
      if (!isRecording) setAppView("today", { scrollBehavior: "auto" });
    }, { once: true });

    window.addEventListener("pageshow", () => {
      if (!isRecording) setAppView("today", { scrollBehavior: "auto" });
    });

    init().catch((error) => {
      console.error(error);
      setStatus("초기화 오류", false);
    });
  </script>
</body>
</html>
